services:
  wan-2.1-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: spark-ai-hub-wan-2-1-app
    ports:
      - "7873:7860"
    env_file:
      - .env
    environment:
      WAN_CKPT_DIR: "${WAN_CKPT_DIR:-/data/models/Wan2.1-T2V-14B}"
      WAN_MODEL_REPO: "${WAN_MODEL_REPO:-Wan-AI/Wan2.1-T2V-14B}"
      WAN_MODEL_NAME: "${WAN_MODEL_NAME:-t2v-14B}"
      HF_HOME: "${HF_HOME:-/data/hf-home}"
      GRADIO_SERVER_NAME: "${GRADIO_SERVER_NAME:-0.0.0.0}"
      GRADIO_SERVER_PORT: "${GRADIO_SERVER_PORT:-7860}"
      WAN_EXTRA_ARGS: "${WAN_EXTRA_ARGS:-}"
      GRADIO_ANALYTICS_ENABLED: "${GRADIO_ANALYTICS_ENABLED:-False}"
      HF_HUB_DISABLE_PROGRESS_BARS: "${HF_HUB_DISABLE_PROGRESS_BARS:-1}"
    volumes:
      - wan-2-1-models:/data/models
      - wan-2-1-hf-home:/data/hf-home
      - wan-2-1-outputs:/opt/Wan2.1/outputs
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped

volumes:
  wan-2-1-models:
  wan-2-1-hf-home:
  wan-2-1-outputs:
