services:
  qwen-image-2512:
    image: ghcr.io/hitechcloud-vietnam/qwen-image-2512-spark-ai-hub:latest
    container_name: spark-ai-hub-qwen-image-2512
    ports:
      - "7862:7860"
    environment:
      PORT: "7860"
      OUTPUT_DIR: "/data/output"
      HF_HOME: "/root/.cache/huggingface"
      PYTORCH_CUDA_ALLOC_CONF: "expandable_segments:True"
    volumes:
      - qwen-image-2512-cache:/root/.cache/huggingface
      - qwen-image-2512-output:/data/output
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped

volumes:
  qwen-image-2512-cache:
  qwen-image-2512-output:
