name: "OCRFlux-3B"
slug: vllm-ocrflux-3b
version: "1.0.0"
description: "ChatDOC OCRFlux-3B served through vLLM for document OCR, PDF-to-Markdown extraction, table recovery, and cross-page document understanding workflows on NVIDIA GPUs."
author: "ChatDOC"
source: "official"
website: "https://huggingface.co/ChatDOC/OCRFlux-3B"
upstream: "https://huggingface.co/ChatDOC/OCRFlux-3B"
category: llm
categories:
  - llm
  - reasoning
tags:
  - llm
  - multimodal
  - vision
  - image-understanding
  - ocr
  - document-ai
  - markdown-generation
  - table-understanding
  - qwen
  - ocrflux
  - vllm
  - research-license
logo: "/logos/qwen.png"
requirements:
  min_memory_gb: 16
  recommended_memory_gb: 24
  disk_gb: 20
  cuda_compute: "12.1"
ui:
  type: api-only
  port: 9001
  path: "/v1/models"
docker:
  build: false
  build_time_minutes: 6
  gpu: true
status: experimental
release_date: "2025-08"
integration:
  api_url: "http://<NVIDIA_AI_HUB_IP>:9001/v1"
  model_id: "ChatDOC/OCRFlux-3B"
  api_key: "not-needed"
  max_context: "8192"
  curl_example: "curl http://<NVIDIA_AI_HUB_IP>:9001/v1/chat/completions -H 'Content-Type: application/json' -d '{\"model\": \"ChatDOC/OCRFlux-3B\", \"messages\": [{\"role\": \"user\", \"content\": [{\"type\": \"text\", \"text\": \"Convert this page into clean Markdown and preserve table structure.\"}, {\"type\": \"image_url\", \"image_url\": {\"url\": \"https://example.com/invoice-page.png\"}}]}]}'"