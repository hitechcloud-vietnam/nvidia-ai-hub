services:
  hunyuan3d:
    image: abelpc/hunyuan3d-spark:latest
    container_name: sparkforge-hunyuan3d
    ports:
      - "7861:7860"
    volumes:
      - hunyuan3d-cache:/root/.cache/huggingface
      - hunyuan3d-output:/workspace/Hunyuan3D-2.1/output
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped

volumes:
  hunyuan3d-cache:
  hunyuan3d-output: