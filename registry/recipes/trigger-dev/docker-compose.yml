services:
  postgres:
    image: ${POSTGRES_IMAGE:-postgres:16}
    container_name: nvidia-ai-hub-trigger-dev-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-triggerdotdev}
      POSTGRES_USER: ${POSTGRES_USER:-triggerdotdev}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me-trigger-postgres-password}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-triggerdotdev} -d ${POSTGRES_DB:-triggerdotdev}"]
      interval: 10s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  redis:
    image: ${REDIS_IMAGE:-redis:7-alpine}
    container_name: nvidia-ai-hub-trigger-dev-redis
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:-change-me-trigger-redis-password}"]
    volumes:
      - ./data/redis:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a ${REDIS_PASSWORD:-change-me-trigger-redis-password} ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  electric:
    image: ${ELECTRIC_IMAGE:-electricdotdev/electric:latest}
    container_name: nvidia-ai-hub-trigger-dev-electric
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-triggerdotdev}:${POSTGRES_PASSWORD:-change-me-trigger-postgres-password}@postgres:5432/${POSTGRES_DB:-triggerdotdev}
    ports:
      - "3001:3000"
    restart: unless-stopped

  trigger-webapp:
    image: ${TRIGGER_WEBAPP_IMAGE:-ghcr.io/triggerdotdev/webapp:latest}
    container_name: nvidia-ai-hub-trigger-dev
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      electric:
        condition: service_started
    environment:
      APP_ORIGIN: ${APP_ORIGIN:-http://localhost:8030}
      LOGIN_ORIGIN: ${LOGIN_ORIGIN:-http://localhost:8030}
      API_ORIGIN: http://trigger-webapp:3030
      ELECTRIC_ORIGIN: http://electric:3000
      DATABASE_URL: postgres://${POSTGRES_USER:-triggerdotdev}:${POSTGRES_PASSWORD:-change-me-trigger-postgres-password}@postgres:5432/${POSTGRES_DB:-triggerdotdev}
      DIRECT_URL: postgres://${POSTGRES_USER:-triggerdotdev}:${POSTGRES_PASSWORD:-change-me-trigger-postgres-password}@postgres:5432/${POSTGRES_DB:-triggerdotdev}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-change-me-trigger-redis-password}
      SESSION_SECRET: ${SESSION_SECRET:-change-me-trigger-session-secret-32-chars}
      MAGIC_LINK_SECRET: ${MAGIC_LINK_SECRET:-change-me-trigger-magic-link-secret-32-chars}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-change-me-trigger-encryption-key-32-chars}
      MANAGED_WORKER_SECRET: ${MANAGED_WORKER_SECRET:-change-me-trigger-managed-worker-secret-32-chars}
    ports:
      - "${TRIGGER_HOST_PORT:-8030}:3030"
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:3030/healthcheck || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 20
      start_period: 45s
    restart: unless-stopped
