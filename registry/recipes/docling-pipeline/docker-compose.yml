services:
  docling-pipeline:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: docling-pipeline
    env_file:
      - .env
    environment:
      API_PORT: ${API_PORT:-8000}
      WORKSPACE_ROOT: ${WORKSPACE_ROOT:-/workspace}
      DEFAULT_EXPORT_FORMATS: ${DEFAULT_EXPORT_FORMATS:-md,json,html,txt,yaml,doctags}
      MAX_UPLOAD_MB: ${MAX_UPLOAD_MB:-200}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    ports:
      - "${HOST_PORT:-3087}:${API_PORT:-8000}"
    volumes:
      - ./workspace:/workspace
    restart: unless-stopped
