services:
  wonder3d:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nvidia-ai-hub-wonder3d
    ports:
      - "7875:7860"
    env_file:
      - .env
    environment:
      HF_HOME: "${HF_HOME:-/root/.cache/huggingface}"
      HUGGINGFACE_HUB_CACHE: "${HUGGINGFACE_HUB_CACHE:-/root/.cache/huggingface}"
      U2NET_HOME: "${U2NET_HOME:-/data/u2net}"
      GRADIO_SERVER_NAME: "${GRADIO_SERVER_NAME:-0.0.0.0}"
      GRADIO_SERVER_PORT: "${GRADIO_SERVER_PORT:-7860}"
      GRADIO_ANALYTICS_ENABLED: "${GRADIO_ANALYTICS_ENABLED:-False}"
      HF_HUB_DISABLE_PROGRESS_BARS: "${HF_HUB_DISABLE_PROGRESS_BARS:-1}"
    volumes:
      - wonder3d-hf-cache:/root/.cache/huggingface
      - wonder3d-outputs:/opt/Wonder3D/outputs
      - wonder3d-sam:/opt/Wonder3D/sam_pt
      - wonder3d-u2net:/data/u2net
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped

volumes:
  wonder3d-hf-cache:
  wonder3d-outputs:
  wonder3d-sam:
  wonder3d-u2net:
