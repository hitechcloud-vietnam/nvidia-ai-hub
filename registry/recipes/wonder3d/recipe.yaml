name: "Wonder3D"
slug: wonder3d
version: "1.0.0"
description: "Run the official Wonder3D Gradio multi-view demo on NVIDIA GPUs for single-image 3D preprocessing with persistent model cache, SAM weights, and generated normals or color output storage."
author: "Wonder3D Authors"
source: "official"
website: "https://github.com/xxlong0/Wonder3D"
upstream: "https://github.com/xxlong0/Wonder3D"
category: 3d-gen
categories:
  - 3d-gen
tags:
  - 3d
  - image-to-3d
  - multiview
  - normals
  - gradio
  - wonder3d
  - mit
icon: "🪄"
logo: ""
requirements:
  min_memory_gb: 24
  recommended_memory_gb: 48
  disk_gb: 100
  cuda_compute: "11.7"
ui:
  type: web
  port: 7875
  path: "/"
  health_path: "/"
docker:
  build: true
  build_time_minutes: 35
  gpu: true
status: experimental
runtime_env_path: "registry/recipes/wonder3d/.env"
requires_hf_token: false
commands:
  - label: "Install / build / launch"
    description: "Build the official Wonder3D environment, download the required SAM checkpoint if missing, and start the multi-view Gradio UI on port 7875."
    command: "docker compose -p nvidia-ai-hub-wonder3d -f registry/recipes/wonder3d/docker-compose.yml up -d --build"
  - label: "Stop"
    description: "Stop Wonder3D while preserving the Hugging Face cache, SAM checkpoint, and generated outputs in Docker volumes."
    command: "docker compose -p nvidia-ai-hub-wonder3d -f registry/recipes/wonder3d/docker-compose.yml down"
