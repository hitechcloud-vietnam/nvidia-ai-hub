services:
  gateway:
    build:
      context: .
      dockerfile: Dockerfile
    image: ${GATEWAY_IMAGE_NAME:-vllm-multi-model-gateway}
    container_name: nvidia-ai-hub-vllm-multi-model-gateway
    depends_on:
      - vllm-model-a
      - vllm-model-b
    environment:
      GATEWAY_API_KEY: ${GATEWAY_API_KEY:-change-me}
      ROUTE_QWEN3_4B_INSTRUCT: http://vllm-model-a:8000
      ROUTE_LLAMA32_3B_INSTRUCT: http://vllm-model-b:8000
    ports:
      - "${GATEWAY_PORT:-9010}:9010"
    volumes:
      - ./logs:/app/logs
      - ./gateway:/app/gateway-state
    restart: unless-stopped

  vllm-model-a:
    image: ${VLLM_IMAGE:-vllm/vllm-openai:v0.20.0-aarch64-cu130}
    container_name: nvidia-ai-hub-vllm-model-a
    ports:
      - "${VLLM_MODEL_A_HOST_PORT:-9011}:8000"
    volumes:
      - ./models:/models
      - huggingface-cache:/root/.cache/huggingface
    environment:
      HUGGING_FACE_HUB_TOKEN: ${HF_TOKEN}
      HF_TOKEN: ${HF_TOKEN}
      HF_HUB_OFFLINE: ${HF_HUB_OFFLINE:-0}
      TRANSFORMERS_OFFLINE: ${TRANSFORMERS_OFFLINE:-0}
      VLLM_API_KEY: ${GATEWAY_API_KEY:-change-me}
    ipc: host
    command:
      - --model
      - ${VLLM_MODEL_A:-Qwen/Qwen3-4B-Instruct-2507}
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --tensor-parallel-size
      - "${VLLM_MODEL_A_TENSOR_PARALLEL:-1}"
      - --max-model-len
      - "${VLLM_MODEL_A_MAX_MODEL_LEN:-32768}"
      - --gpu-memory-utilization
      - "${VLLM_MODEL_A_GPU_MEMORY_UTILIZATION:-0.85}"
      - --api-key
      - ${GATEWAY_API_KEY:-change-me}
      - --served-model-name
      - ${VLLM_MODEL_A_ALIAS:-qwen3-4b-instruct}
      - --enable-prefix-caching
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped

  vllm-model-b:
    image: ${VLLM_IMAGE:-vllm/vllm-openai:v0.20.0-aarch64-cu130}
    container_name: nvidia-ai-hub-vllm-model-b
    ports:
      - "${VLLM_MODEL_B_HOST_PORT:-9012}:8000"
    volumes:
      - ./models:/models
      - huggingface-cache:/root/.cache/huggingface
    environment:
      HUGGING_FACE_HUB_TOKEN: ${HF_TOKEN}
      HF_TOKEN: ${HF_TOKEN}
      HF_HUB_OFFLINE: ${HF_HUB_OFFLINE:-0}
      TRANSFORMERS_OFFLINE: ${TRANSFORMERS_OFFLINE:-0}
      VLLM_API_KEY: ${GATEWAY_API_KEY:-change-me}
    ipc: host
    command:
      - --model
      - ${VLLM_MODEL_B:-meta-llama/Llama-3.2-3B-Instruct}
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --tensor-parallel-size
      - "${VLLM_MODEL_B_TENSOR_PARALLEL:-1}"
      - --max-model-len
      - "${VLLM_MODEL_B_MAX_MODEL_LEN:-32768}"
      - --gpu-memory-utilization
      - "${VLLM_MODEL_B_GPU_MEMORY_UTILIZATION:-0.85}"
      - --api-key
      - ${GATEWAY_API_KEY:-change-me}
      - --served-model-name
      - ${VLLM_MODEL_B_ALIAS:-llama32-3b-instruct}
      - --enable-prefix-caching
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped

volumes:
  huggingface-cache:
