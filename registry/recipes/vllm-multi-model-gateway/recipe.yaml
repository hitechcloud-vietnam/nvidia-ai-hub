name: "vLLM Multi-Model Gateway"
slug: vllm-multi-model-gateway
version: "1.0.0"
description: "Run two dedicated vLLM OpenAI-compatible backends behind a small OpenAI-style gateway so clients can target multiple model IDs through one shared entrypoint."
author: "vLLM Project"
source: "official"
website: "https://docs.vllm.ai/"
upstream: "https://github.com/vllm-project/vllm"
category: llm
categories:
  - runtime
  - llm
  - workflow
tags:
  - vllm
  - gateway
  - reverse-proxy
  - openai-compatible
  - runtime
  - multi-model
  - nginx
icon: "🚦"
logo: ""
requirements:
  min_memory_gb: 32
  recommended_memory_gb: 64
  disk_gb: 80
  cuda_compute: "12.1"
ui:
  type: api-only
  port: 9010
  path: "/v1/models"
  health_path: "/healthz"
docker:
  build: false
  build_time_minutes: 8
  gpu: true
status: experimental
runtime_env_path: "registry/recipes/vllm-multi-model-gateway/.env"
requires_hf_token: true
depends_on: []
integration:
  api_url: "http://<SPARK_IP>:9010/v1"
  model_id: "qwen3-4b-instruct"
  api_key: "change-me"
  max_context: "Per backend model configuration"
  max_output_tokens: "Per backend model configuration"
  curl_example: "curl http://<SPARK_IP>:9010/v1/chat/completions -H 'Content-Type: application/json' -H 'Authorization: Bearer change-me' -d '{\"model\":\"qwen3-4b-instruct\",\"messages\":[{\"role\":\"user\",\"content\":\"Summarize the gateway topology.\"}]}'"
commands:
  - label: "Install / launch"
    description: "Pull the gateway image, start two dedicated vLLM backends, and publish one OpenAI-compatible entrypoint on port 9010."
    command: "docker compose --env-file registry/recipes/vllm-multi-model-gateway/.env -p nvidia-ai-hub-vllm-multi-model-gateway -f registry/recipes/vllm-multi-model-gateway/docker-compose.yml up -d"
  - label: "Stop"
    description: "Stop the gateway and both vLLM backends while preserving cache and local gateway configuration."
    command: "docker compose --env-file registry/recipes/vllm-multi-model-gateway/.env -p nvidia-ai-hub-vllm-multi-model-gateway -f registry/recipes/vllm-multi-model-gateway/docker-compose.yml down"