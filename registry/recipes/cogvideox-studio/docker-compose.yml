services:
  cogvideox-studio:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nvidia-ai-hub-cogvideox-studio
    ports:
      - "7871:7860"
    env_file:
      - .env
    environment:
      HF_HOME: "${HF_HOME:-/root/.cache/huggingface}"
      TRANSFORMERS_CACHE: "${TRANSFORMERS_CACHE:-/root/.cache/huggingface/transformers}"
      GRADIO_SERVER_PORT: "${GRADIO_SERVER_PORT:-7860}"
      GRADIO_SERVER_NAME: "${GRADIO_SERVER_NAME:-0.0.0.0}"
      COGVIDEO_QUEUE_SIZE: "${COGVIDEO_QUEUE_SIZE:-15}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      OPENAI_BASE_URL: "${OPENAI_BASE_URL:-}"
      HF_TOKEN: "${HF_TOKEN:-}"
      HF_HUB_DISABLE_PROGRESS_BARS: "${HF_HUB_DISABLE_PROGRESS_BARS:-1}"
      GRADIO_ANALYTICS_ENABLED: "${GRADIO_ANALYTICS_ENABLED:-False}"
    volumes:
      - cogvideox-studio-hf-cache:/root/.cache/huggingface
      - cogvideox-studio-output:/opt/cogvideo/inference/gradio_composite_demo/output
      - cogvideox-studio-gradio-tmp:/opt/cogvideo/inference/gradio_composite_demo/gradio_tmp
      - cogvideox-studio-realesrgan:/opt/cogvideo/inference/gradio_composite_demo/model_real_esran
      - cogvideox-studio-rife:/opt/cogvideo/inference/gradio_composite_demo/model_rife
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped

volumes:
  cogvideox-studio-hf-cache:
  cogvideox-studio-output:
  cogvideox-studio-gradio-tmp:
  cogvideox-studio-realesrgan:
  cogvideox-studio-rife:
