services:
  vllm:
    image: vllm/vllm-openai:v0.17.1-aarch64-cu130
    container_name: nvidia-ai-hub-vllm-mistral-7b-instruct-v03
    ports:
      - "9001:8000"
    volumes:
      - huggingface-cache:/root/.cache/huggingface
    environment:
      - HF_HUB_OFFLINE=${HF_HUB_OFFLINE:-0}
      - TRANSFORMERS_OFFLINE=${TRANSFORMERS_OFFLINE:-0}
    ipc: host
    command:
      - --model
      - mistralai/Mistral-7B-Instruct-v0.3
      - --port
      - "8000"
      - --tokenizer-mode
      - mistral
      - --config-format
      - mistral
      - --load-format
      - mistral
      - --max-model-len
      - "32768"
      - --enable-prefix-caching
      - --gpu-memory-utilization
      - "0.28"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped

volumes:
  huggingface-cache: