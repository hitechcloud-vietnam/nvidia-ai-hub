services:
  vllm:
    image: nvcr.io/nvidia/vllm:26.03-py3
    container_name: spark-ai-hub-vllm-gemma4-31b-nvfp4
    ports:
      - "9001:8000"
    volumes:
      - huggingface-cache:/root/.cache/huggingface
    environment:
      - HF_HUB_OFFLINE=${HF_HUB_OFFLINE:-0}
      - TRANSFORMERS_OFFLINE=${TRANSFORMERS_OFFLINE:-0}
    ipc: host
    command:
      - vllm
      - serve
      - nvidia/Gemma-4-31B-IT-NVFP4
      - --quantization
      - modelopt
      - --port
      - "8000"
      - --max-model-len
      - "131072"
      - --enable-prefix-caching
      - --enable-auto-tool-choice
      - --tool-call-parser
      - gemma4
      - --default-chat-template-kwargs
      - '{"enable_thinking": true}'
      - --gpu-memory-utilization
      - "0.65"
      - --kv-cache-dtype
      - fp8_e4m3
      - --reasoning-parser
      - gemma4
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped

volumes:
  huggingface-cache:
