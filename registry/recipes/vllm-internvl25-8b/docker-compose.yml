services:
  vllm:
    image: vllm/vllm-openai:v0.20.0-aarch64-cu130
    container_name: nvidia-ai-hub-vllm-internvl25-8b
    ports:
      - "9001:8000"
    volumes:
      - huggingface-cache:/root/.cache/huggingface
    environment:
      - HF_HUB_OFFLINE=${HF_HUB_OFFLINE:-0}
      - TRANSFORMERS_OFFLINE=${TRANSFORMERS_OFFLINE:-0}
    ipc: host
    command:
      - --model
      - OpenGVLab/InternVL2_5-8B
      - --port
      - "8000"
      - --max-model-len
      - "8192"
      - --limit-mm-per-prompt
      - image=1
      - --trust-remote-code
      - --enable-prefix-caching
      - --gpu-memory-utilization
      - "0.55"
      - --served-model-name
      - internvl2_5-8b
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped

volumes:
  huggingface-cache: