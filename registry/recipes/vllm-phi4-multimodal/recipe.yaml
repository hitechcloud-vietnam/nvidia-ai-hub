  - vision
  - audio
  - speech
  - ocr
  - chart-understanding
  - phi
  - microsoft
  - vllm
  - mit
logo: "/logos/microsoft.png"
requirements:
  min_memory_gb: 18
  recommended_memory_gb: 28
  disk_gb: 26
  cuda_compute: "12.1"
ui:
  type: api-only
  port: 9001
  path: "/v1/models"
docker:
  build: false
  build_time_minutes: 10
  gpu: true
status: experimental
integration:
  api_url: "http://<NVIDIA_AI_HUB_IP>:9001/v1"
  model_id: "microsoft/Phi-4-multimodal-instruct"
  api_key: "not-needed"
  max_context: "131072"
  curl_example: "curl http://<NVIDIA_AI_HUB_IP>:9001/v1/chat/completions -H 'Content-Type: application/json' -d '{\"model\": \"microsoft/Phi-4-multimodal-instruct\", \"messages\": [{\"role\": \"user\", \"content\": [{\"type\": \"text\", \"text\": \"Describe the uploaded image and summarize the attached audio clip.\"}]}]}'"