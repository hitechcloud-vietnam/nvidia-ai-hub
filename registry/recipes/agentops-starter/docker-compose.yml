services:
  clickhouse:
    image: clickhouse/clickhouse-server:24.12
    container_name: nvidia-ai-hub-agentops-clickhouse
    environment:
      CLICKHOUSE_DB: ${CLICKHOUSE_DATABASE:-otel_2}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-default}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-password}
    ports:
      - "${CLICKHOUSE_HTTP_HOST_PORT:-8123}:8123"
      - "${CLICKHOUSE_NATIVE_HOST_PORT:-9000}:9000"
    volumes:
      - ./data/clickhouse:/var/lib/clickhouse
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:8123/ping || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped

  clickhouse-init:
    image: curlimages/curl:8.12.1
    container_name: nvidia-ai-hub-agentops-clickhouse-init
    depends_on:
      clickhouse:
        condition: service_healthy
    command:
      - /bin/sh
      - -lc
      - >-
        curl --fail --show-error --silent --user ${CLICKHOUSE_USER:-default}:${CLICKHOUSE_PASSWORD:-password}
        "http://clickhouse:8123/?query=CREATE%20DATABASE%20IF%20NOT%20EXISTS%20${CLICKHOUSE_DATABASE:-otel_2}"
        && curl --fail --show-error --silent --location https://raw.githubusercontent.com/AgentOps-AI/agentops/main/app/clickhouse/migrations/0000_init.sql
        | curl --fail --show-error --silent --user ${CLICKHOUSE_USER:-default}:${CLICKHOUSE_PASSWORD:-password}
        --data-binary @- "http://clickhouse:8123/?query="
    restart: "no"

  otelcollector:
    build:
      context: https://github.com/AgentOps-AI/agentops.git#main:app/opentelemetry-collector
    container_name: nvidia-ai-hub-agentops-otelcollector
    depends_on:
      clickhouse-init:
        condition: service_completed_successfully
    ports:
      - "${OTEL_GRPC_HOST_PORT:-4317}:4317"
      - "${OTEL_HTTP_HOST_PORT:-4318}:4318"
    restart: unless-stopped

  api:
    build:
      context: https://github.com/AgentOps-AI/agentops.git#main:app
      dockerfile: api/Dockerfile
    container_name: nvidia-ai-hub-agentops-api
    depends_on:
      clickhouse-init:
        condition: service_completed_successfully
    environment:
      SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
      SUPABASE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      APP_URL: ${APP_URL}
      PROTOCOL: ${PROTOCOL}
      API_DOMAIN: ${API_DOMAIN}
      APP_DOMAIN: ${APP_DOMAIN}
      SUPABASE_HOST: ${SUPABASE_HOST}
      SUPABASE_PORT: ${SUPABASE_PORT}
      SUPABASE_DATABASE: ${SUPABASE_DATABASE}
      SUPABASE_USER: ${SUPABASE_USER}
      SUPABASE_PASSWORD: ${SUPABASE_PASSWORD}
      SUPABASE_MAX_POOL_SIZE: ${SUPABASE_MAX_POOL_SIZE}
      SUPABASE_SSLMODE: ${SUPABASE_SSLMODE}
      SENTRY_DSN: ${SENTRY_DSN}
      SENTRY_ENVIRONMENT: ${SENTRY_ENVIRONMENT}
      LOGGING_LEVEL: ${LOGGING_LEVEL}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      CLICKHOUSE_HOST: ${CLICKHOUSE_HOST}
      CLICKHOUSE_PORT: ${CLICKHOUSE_PORT}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
      CLICKHOUSE_DATABASE: ${CLICKHOUSE_DATABASE}
      CLICKHOUSE_SECURE: ${CLICKHOUSE_SECURE}
      CLICKHOUSE_ENDPOINT: ${CLICKHOUSE_ENDPOINT}
      CLICKHOUSE_USERNAME: ${CLICKHOUSE_USERNAME}
      SUPABASE_S3_BUCKET: ${SUPABASE_S3_BUCKET}
      SUPABASE_S3_LOGS_BUCKET: ${SUPABASE_S3_LOGS_BUCKET}
      SUPABASE_S3_ACCESS_KEY_ID: ${SUPABASE_S3_ACCESS_KEY_ID}
      SUPABASE_S3_SECRET_ACCESS_KEY: ${SUPABASE_S3_SECRET_ACCESS_KEY}
    extra_hosts:
      - host.docker.internal:host-gateway
    ports:
      - "${API_HOST_PORT:-8000}:8000"
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:8000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 45s
    restart: unless-stopped

  dashboard:
    build:
      context: https://github.com/AgentOps-AI/agentops.git#main:app/dashboard
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY}
    container_name: nvidia-ai-hub-agentops-dashboard
    depends_on:
      api:
        condition: service_healthy
    environment:
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      SUPABASE_PROJECT_ID: ${SUPABASE_PROJECT_ID}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL}
      NEXT_PUBLIC_POSTHOG_KEY: ${NEXT_PUBLIC_POSTHOG_KEY}
      NEXT_PUBLIC_POSTHOG_HOST: ${NEXT_PUBLIC_POSTHOG_HOST}
      NEXT_PUBLIC_SENTRY_DSN: ${NEXT_PUBLIC_SENTRY_DSN}
      NEXT_PUBLIC_SENTRY_ORG: ${NEXT_PUBLIC_SENTRY_ORG}
      NEXT_PUBLIC_SENTRY_PROJECT: ${NEXT_PUBLIC_SENTRY_PROJECT}
      NEXT_PUBLIC_SENTRY_ENVIRONMENT: ${NEXT_PUBLIC_SENTRY_ENVIRONMENT}
      NEXT_PUBLIC_SIGNIN_METHODS: ${NEXT_PUBLIC_SIGNIN_METHODS}
      NEXT_PUBLIC_ENVIRONMENT_TYPE: ${NEXT_PUBLIC_ENVIRONMENT_TYPE}
      NEXT_PUBLIC_FALLBACK_API_KEY: ${NEXT_PUBLIC_FALLBACK_API_KEY}
      NEXT_PUBLIC_PLAYGROUND: ${NEXT_PUBLIC_PLAYGROUND}
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY}
      STRIPE_SECRET_KEY: ${NEXT_STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${NEXT_STRIPE_WEBHOOK_SECRET}
    extra_hosts:
      - host.docker.internal:host-gateway
    ports:
      - "${DASHBOARD_HOST_PORT:-3000}:3000"
    restart: unless-stopped
