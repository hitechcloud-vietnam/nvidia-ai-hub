services:
  qdrant:
    image: ${QDRANT_IMAGE:-qdrant/qdrant:latest}
    container_name: nvidia-ai-hub-llamaindex-qdrant
    ports:
      - "${QDRANT_HTTP_HOST_PORT:-6337}:6333"
      - "${QDRANT_GRPC_HOST_PORT:-6338}:6334"
    volumes:
      - ./data/qdrant:/qdrant/storage
    restart: unless-stopped

  llamaindex-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nvidia-ai-hub-llamaindex-starter
    depends_on:
      - qdrant
    env_file:
      - .env
    environment:
      PORT: ${LLAMAINDEX_CONTAINER_PORT:-8000}
      QDRANT_URL: ${QDRANT_URL:-http://qdrant:6333}
      QDRANT_COLLECTION: ${QDRANT_COLLECTION:-llamaindex_starter}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11435}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen3.5:4b}
      OLLAMA_EMBED_MODEL: ${OLLAMA_EMBED_MODEL:-nomic-embed-text}
      AUTO_INGEST: ${AUTO_INGEST:-true}
      CHUNK_SIZE: ${CHUNK_SIZE:-1024}
      CHUNK_OVERLAP: ${CHUNK_OVERLAP:-100}
      SIMILARITY_TOP_K: ${SIMILARITY_TOP_K:-5}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      DATA_DIR: /app/data
      STORAGE_DIR: /app/storage
    ports:
      - "${LLAMAINDEX_PORT:-3084}:${LLAMAINDEX_CONTAINER_PORT:-8000}"
    volumes:
      - ./data/documents:/app/data
      - ./data/storage:/app/storage
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
