services:
  postgres:
    image: ${POSTGRES_IMAGE:-postgres:16-alpine}
    container_name: nvidia-ai-hub-activepieces-postgres
    environment:
      POSTGRES_DB: ${AP_POSTGRES_DATABASE:-activepieces}
      POSTGRES_USER: ${AP_POSTGRES_USERNAME:-activepieces}
      POSTGRES_PASSWORD: ${AP_POSTGRES_PASSWORD:-change-me-activepieces-postgres}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${AP_POSTGRES_USERNAME:-activepieces} -d ${AP_POSTGRES_DATABASE:-activepieces}"]
      interval: 10s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  redis:
    image: ${REDIS_IMAGE:-redis:7-alpine}
    container_name: nvidia-ai-hub-activepieces-redis
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - ./data/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  activepieces:
    image: ${ACTIVEPIECES_IMAGE:-activepieces/activepieces:latest}
    container_name: nvidia-ai-hub-activepieces
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      AP_FRONTEND_URL: ${AP_FRONTEND_URL:-http://localhost:3005}
      AP_DB_TYPE: ${AP_DB_TYPE:-postgres2}
      AP_POSTGRES_DATABASE: ${AP_POSTGRES_DATABASE:-activepieces}
      AP_POSTGRES_HOST: ${AP_POSTGRES_HOST:-postgres}
      AP_POSTGRES_PORT: ${AP_POSTGRES_PORT:-5432}
      AP_POSTGRES_USERNAME: ${AP_POSTGRES_USERNAME:-activepieces}
      AP_POSTGRES_PASSWORD: ${AP_POSTGRES_PASSWORD:-change-me-activepieces-postgres}
      AP_REDIS_HOST: ${AP_REDIS_HOST:-redis}
      AP_REDIS_PORT: ${AP_REDIS_PORT:-6379}
      AP_ENCRYPTION_KEY: ${AP_ENCRYPTION_KEY:-change-me-activepieces-encryption-key}
      AP_JWT_SECRET: ${AP_JWT_SECRET:-change-me-activepieces-jwt-secret}
    ports:
      - "${ACTIVEPIECES_HOST_PORT:-3005}:80"
    volumes:
      - ./data/app:/root/.activepieces
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1/ || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 20
      start_period: 45s
    restart: unless-stopped
