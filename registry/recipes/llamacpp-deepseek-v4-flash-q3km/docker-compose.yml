services:
  llama-server:
    image: ghcr.io/ggml-org/llama.cpp:full-cuda13-b8953
    container_name: nvidia-ai-hub-llamacpp-deepseek-v4-flash-q3km
    entrypoint:
      - /bin/sh
      - -c
      - |
        if [ ! -f /models/DeepSeekV4-Flash-158B-Q3_K_M.gguf ]; then
          echo "[nvidia-ai-hub] Downloading DeepSeek-V4-Flash Q3_K_M (~100 GB)..."
          hf download tecaprovn/deepseek-v4-flash-gguf --include 'DeepSeekV4-Flash-158B-Q3_K_M.gguf' --local-dir /models
        fi
        exec /app/llama-server "$$@"
      - --
    command:
      - -m
      - /models/DeepSeekV4-Flash-158B-Q3_K_M.gguf
      - -ngl
      - "999"
      - -c
      - "131072"
      - --host
      - "0.0.0.0"
      - --port
      - "8080"
      - --alias
      - deepseek-v4-flash
      - -fa
      - "on"
      - -ctk
      - q4_0
      - -ctv
      - q4_0
      - --jinja
      - --temp
      - "1.0"
      - --top-p
      - "1.0"
      - --no-mmap
      - --cont-batching
      - -np
      - "1"
      - -t
      - "16"
      - -tb
      - "16"
    ports:
      - "9001:8080"
    volumes:
      - llamacpp-deepseek-v4-flash-models:/models
    environment:
      - GGML_CUDA_ENABLE_UNIFIED_MEMORY=1
      - HF_TOKEN=${HF_TOKEN:-}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: "no"

volumes:
  llamacpp-deepseek-v4-flash-models: