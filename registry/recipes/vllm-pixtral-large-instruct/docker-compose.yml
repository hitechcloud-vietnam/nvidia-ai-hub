services:
  vllm:
    image: vllm/vllm-openai:v0.17.1-aarch64-cu130
    container_name: nvidia-ai-hub-vllm-pixtral-large-instruct
    ports:
      - "9001:8000"
    volumes:
      - huggingface-cache:/root/.cache/huggingface
    environment:
      - HF_HUB_OFFLINE=${HF_HUB_OFFLINE:-0}
      - TRANSFORMERS_OFFLINE=${TRANSFORMERS_OFFLINE:-0}
    ipc: host
    command:
      - --model
      - mistralai/Pixtral-Large-Instruct-2411
      - --port
      - "8000"
      - --tensor-parallel-size
      - "8"
      - --tokenizer-mode
      - mistral
      - --config-format
      - mistral
      - --load-format
      - mistral
      - --max-model-len
      - "131072"
      - --limit-mm-per-prompt
      - image=4
      - --enable-prefix-caching
      - --gpu-memory-utilization
      - "0.90"
      - --served-model-name
      - pixtral-large-instruct
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped

volumes:
  huggingface-cache:
