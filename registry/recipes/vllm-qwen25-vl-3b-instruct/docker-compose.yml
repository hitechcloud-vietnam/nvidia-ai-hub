services:
  vllm:
    image: vllm/vllm-openai:v0.17.1-aarch64-cu130
    container_name: nvidia-ai-hub-vllm-qwen25-vl-3b-instruct
    ports:
      - "9001:8000"
    volumes:
      - huggingface-cache:/root/.cache/huggingface
    environment:
      - HF_HUB_OFFLINE=${HF_HUB_OFFLINE:-0}
      - TRANSFORMERS_OFFLINE=${TRANSFORMERS_OFFLINE:-0}
    ipc: host
    command:
      - --model
      - Qwen/Qwen2.5-VL-3B-Instruct
      - --port
      - "8000"
      - --max-model-len
      - "32768"
      - --limit-mm-per-prompt
      - image=1
      - --enable-prefix-caching
      - --gpu-memory-utilization
      - "0.35"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped

volumes:
  huggingface-cache: