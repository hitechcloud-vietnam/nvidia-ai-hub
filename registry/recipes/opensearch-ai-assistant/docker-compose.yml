services:
  opensearch:
    image: ${OPENSEARCH_IMAGE}
    container_name: nvidia-ai-hub-opensearch-ai
    environment:
      discovery.type: single-node
      OPENSEARCH_INITIAL_ADMIN_PASSWORD: ${OPENSEARCH_INITIAL_ADMIN_PASSWORD}
      bootstrap.memory_lock: "true"
      OPENSEARCH_JAVA_OPTS: ${OPENSEARCH_JAVA_OPTS}
      plugins.ml_commons.only_run_on_ml_node: "false"
      plugins.ml_commons.native_memory_threshold: "99"
      plugins.ml_commons.model_access_control_enabled: "false"
      plugins.ml_commons.connector_access_control_enabled: "false"
      plugins.ml_commons.remote_inference.enabled: "true"
      plugins.ml_commons.agent_framework_enabled: "true"
      plugins.ml_commons.rag_pipeline_feature_enabled: "true"
      plugins.neural_search.hybrid_search_disabled: "false"
      compatibility.override_main_response_version: "true"
    ports:
      - "${OPENSEARCH_API_PORT:-9201}:9200"
      - "${OPENSEARCH_TRANSPORT_PORT:-9301}:9300"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./data/opensearch:/usr/share/opensearch/data
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    restart: unless-stopped

  dashboards:
    image: ${OPENSEARCH_DASHBOARDS_IMAGE}
    container_name: nvidia-ai-hub-opensearch-dashboards-ai
    depends_on:
      - opensearch
    environment:
      DISABLE_SECURITY_DASHBOARDS_PLUGIN: ${DISABLE_SECURITY_DASHBOARDS_PLUGIN:-false}
      DASHBOARDS_USERNAME: ${DASHBOARDS_USERNAME}
      DASHBOARDS_PASSWORD: ${DASHBOARDS_PASSWORD}
      QUERY_ASSIST_AGENT_CONFIG: ${QUERY_ASSIST_AGENT_CONFIG:-os_query_assist_ppl}
      QUERY_ASSIST_TIME_RANGE_AGENT_CONFIG: ${QUERY_ASSIST_TIME_RANGE_AGENT_CONFIG:-os_query_time_range_parser}
    ports:
      - "${HOST_PORT:-3091}:5601"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./config/opensearch_dashboards.yml:/usr/share/opensearch-dashboards/config/opensearch_dashboards.yml:ro
    restart: unless-stopped
