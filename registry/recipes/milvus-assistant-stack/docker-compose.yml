services:
  etcd:
    image: ${ETCD_IMAGE}
    container_name: nvidia-ai-hub-milvus-etcd
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: 1000
      ETCD_QUOTA_BACKEND_BYTES: 4294967296
      ETCD_SNAPSHOT_COUNT: 50000
    command: >-
      etcd -advertise-client-urls=http://127.0.0.1:2379
      -listen-client-urls http://0.0.0.0:2379
      --data-dir /etcd
    volumes:
      - ./data/etcd:/etcd
    ports:
      - "${ETCD_CLIENT_PORT:-23791}:2379"
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 30s
      timeout: 20s
      retries: 5
    restart: unless-stopped

  minio:
    image: ${MINIO_IMAGE}
    container_name: nvidia-ai-hub-milvus-minio
    environment:
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
    command: minio server /minio_data --console-address ":9001"
    volumes:
      - ./data/minio:/minio_data
    ports:
      - "${MINIO_PORT:-9002}:9000"
      - "${MINIO_CONSOLE_PORT:-9003}:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 5
    restart: unless-stopped

  milvus:
    image: ${MILVUS_IMAGE}
    container_name: nvidia-ai-hub-milvus-standalone
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET_NAME: ${MINIO_BUCKET_NAME:-milvus-bucket}
    volumes:
      - ./data/milvus:/var/lib/milvus
    ports:
      - "${MILVUS_PORT:-19531}:19530"
      - "${MILVUS_HEALTH_PORT:-9092}:9091"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      start_period: 90s
      timeout: 20s
      retries: 5
    depends_on:
      etcd:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped

  attu:
    image: ${ATTU_IMAGE}
    container_name: nvidia-ai-hub-milvus-attu
    depends_on:
      milvus:
        condition: service_started
    environment:
      MILVUS_ADDRESS: milvus:19530
      MILVUS_NAME: ${MILVUS_NAME:-NVIDIA GPUs Milvus}
      MILVUS_DATABASE: ${MILVUS_DATABASE:-default}
      MILVUS_USERNAME: ${MILVUS_USERNAME}
      MILVUS_PASSWORD: ${MILVUS_PASSWORD}
      ATTU_DB_PATH: ${ATTU_DB_PATH:-/data/attu.db}
      PORT: 3000
    ports:
      - "${ATTU_PORT:-3092}:3000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./data/attu:/data
    restart: unless-stopped
