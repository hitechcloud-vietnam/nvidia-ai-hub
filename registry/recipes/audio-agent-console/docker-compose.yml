services:
  audio-agent-console:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nvidia-ai-hub-audio-agent-console
    env_file:
      - .env
    environment:
      PORT: ${PORT:-8000}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      OPENAI_LLM_MODEL: ${OPENAI_LLM_MODEL:-gpt-4.1-mini}
      OPENAI_STT_MODEL: ${OPENAI_STT_MODEL:-gpt-4o-transcribe}
      OPENAI_TTS_MODEL: ${OPENAI_TTS_MODEL:-gpt-4o-mini-tts}
      OPENAI_TTS_VOICE: ${OPENAI_TTS_VOICE:-alloy}
      OPENAI_TTS_INSTRUCTIONS: ${OPENAI_TTS_INSTRUCTIONS:-Speak clearly, naturally, and keep spoken answers concise.}
      OPENAI_STT_PROMPT: ${OPENAI_STT_PROMPT:-}
      SYSTEM_PROMPT: ${SYSTEM_PROMPT:-You are a concise and helpful voice AI assistant for DGX Spark users. Keep answers short, practical, and easy to speak aloud.}
      GREETING_ENABLED: ${GREETING_ENABLED:-true}
      GREETING_TEXT: ${GREETING_TEXT:-Greet the user briefly, introduce yourself as a voice assistant, and invite the first question.}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    ports:
      - "${HOST_PORT:-7890}:${PORT:-8000}"
    volumes:
      - ./data:/data
    restart: unless-stopped
