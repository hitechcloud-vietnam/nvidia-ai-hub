services:
  vllm:
    image: nvcr.io/nvidia/vllm:26.03-py3
    container_name: nvidia-ai-hub-vllm-llama31-8b-fp8
    ports:
      - "9001:8000"
    volumes:
      - huggingface-cache:/root/.cache/huggingface
    environment:
      - HF_HUB_OFFLINE=${HF_HUB_OFFLINE:-0}
      - TRANSFORMERS_OFFLINE=${TRANSFORMERS_OFFLINE:-0}
    ipc: host
    command:
      - vllm
      - serve
      - nvidia/Llama-3.1-8B-Instruct-FP8
      - --quantization
      - modelopt
      - --port
      - "8000"
      - --max-model-len
      - "131072"
      - --enable-prefix-caching
      - --gpu-memory-utilization
      - "0.24"
      - --kv-cache-dtype
      - fp8_e4m3
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped

volumes:
  huggingface-cache:
