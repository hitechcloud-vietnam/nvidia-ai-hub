services:
  vllm:
    image: vllm/vllm-openai:v0.17.1-aarch64-cu130
    container_name: spark-ai-hub-vllm-llama32-90b-vision-instruct
    ports:
      - "9001:8000"
    volumes:
      - huggingface-cache:/root/.cache/huggingface
    environment:
      - HF_HUB_OFFLINE=${HF_HUB_OFFLINE:-0}
      - TRANSFORMERS_OFFLINE=${TRANSFORMERS_OFFLINE:-0}
    ipc: host
    command:
      - --model
      - meta-llama/Llama-3.2-90B-Vision-Instruct
      - --port
      - "8000"
      - --tensor-parallel-size
      - "8"
      - --max-model-len
      - "131072"
      - --limit-mm-per-prompt
      - image=1
      - --enable-prefix-caching
      - --max-num-batched-tokens
      - "8192"
      - --gpu-memory-utilization
      - "0.90"
      - --cpu-offload-gb
      - "24"
      - --served-model-name
      - llama-3.2-90b-vision-instruct
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped

volumes:
  huggingface-cache: