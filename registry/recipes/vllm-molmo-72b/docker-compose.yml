services:
  vllm:
    image: vllm/vllm-openai:v0.20.0-aarch64-cu130
    container_name: nvidia-ai-hubb-vllm-molmo-72b
    ports:
      - "9001:8000"
    volumes:
      - huggingface-cache:/root/.cache/huggingface
    environment:
      - HF_HUB_OFFLINE=${HF_HUB_OFFLINE:-0}
      - TRANSFORMERS_OFFLINE=${TRANSFORMERS_OFFLINE:-0}
    ipc: host
    command:
      - --model
      - allenai/Molmo-72B-0924
      - --port
      - "8000"
      - --dtype
      - bfloat16
      - --tensor-parallel-size
      - "8"
      - --max-model-len
      - "4096"
      - --limit-mm-per-prompt
      - image=1
      - --trust-remote-code
      - --enable-prefix-caching
      - --gpu-memory-utilization
      - "0.90"
      - --served-model-name
      - molmo-72b
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped

volumes:
  huggingface-cache:
