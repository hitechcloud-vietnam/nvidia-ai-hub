services:
  omniroute:
    image: ${OMNIROUTE_IMAGE}
    container_name: omniroute
    restart: unless-stopped
    ports:
      - "${OMNIROUTE_PORT}:${OMNIROUTE_PORT}"
      - "${OMNIROUTE_API_PORT}:${OMNIROUTE_API_PORT}"
    environment:
      NODE_ENV: ${OMNIROUTE_NODE_ENV}
      PORT: ${OMNIROUTE_PORT}
      DASHBOARD_PORT: ${OMNIROUTE_PORT}
      API_PORT: ${OMNIROUTE_API_PORT}
      HOSTNAME: ${OMNIROUTE_HOST}
      API_HOST: ${OMNIROUTE_API_HOST}
      NEXT_PUBLIC_BASE_URL: ${OMNIROUTE_BASE_URL}
      BASE_URL: ${OMNIROUTE_BASE_URL}
      DATA_DIR: ${OMNIROUTE_DATA_DIR}
      JWT_SECRET: ${OMNIROUTE_JWT_SECRET}
      API_KEY_SECRET: ${OMNIROUTE_API_KEY_SECRET}
      INITIAL_PASSWORD: ${OMNIROUTE_INITIAL_PASSWORD}
      REQUIRE_API_KEY: ${OMNIROUTE_REQUIRE_API_KEY}
      AUTH_COOKIE_SECURE: ${OMNIROUTE_AUTH_COOKIE_SECURE}
      STORAGE_ENCRYPTION_KEY: ${OMNIROUTE_STORAGE_ENCRYPTION_KEY}
      CORS_ORIGIN: ${OMNIROUTE_CORS_ORIGIN}
      OMNIROUTE_MEMORY_MB: ${OMNIROUTE_MEMORY_MB}
      OMNIROUTE_DISABLE_BACKGROUND_SERVICES: ${OMNIROUTE_DISABLE_BACKGROUND_SERVICES}
      APP_LOG_LEVEL: ${OMNIROUTE_APP_LOG_LEVEL}
    volumes:
      - ./data:${OMNIROUTE_DATA_DIR}
    healthcheck:
      test: ["CMD", "node", "scripts/healthcheck.mjs"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
