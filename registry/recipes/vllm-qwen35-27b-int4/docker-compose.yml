services:
  vllm:
    image: vllm/vllm-openai:v0.17.1-aarch64-cu130
    container_name: nvidia-ai-hub-vllm-qwen35-27b-int4
    ports:
      - "9001:8000"
    volumes:
      - huggingface-cache:/root/.cache/huggingface
    environment:
      - HF_HUB_OFFLINE=${HF_HUB_OFFLINE:-0}
      - TRANSFORMERS_OFFLINE=${TRANSFORMERS_OFFLINE:-0}
    ipc: host
    command:
      - --model
      - Qwen/Qwen3.5-27B-GPTQ-Int4
      - --port
      - "8000"
      - --max-model-len
      - "262144"
      - --reasoning-parser
      - qwen3
      - --enable-auto-tool-choice
      - --tool-call-parser
      - qwen3_coder
      - --enable-prefix-caching
      - --gpu-memory-utilization
      - "0.70"
      - --mm-processor-cache-type
      - shm
      - --mm-encoder-tp-mode
      - data
      - --kv-cache-dtype
      - fp8_e4m3
      - --speculative-config
      - '{"method": "mtp", "num_speculative_tokens": 1}'
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped

volumes:
  huggingface-cache:
