services:
  qdrant:
    image: ${QDRANT_IMAGE}
    container_name: nvidia-ai-hub-openwebui-rag-qdrant
    ports:
      - "${QDRANT_HTTP_PORT}:6333"
      - "${QDRANT_GRPC_HOST_PORT}:6334"
    volumes:
      - ./data/qdrant:/qdrant/storage
    restart: unless-stopped

  open-webui:
    image: ${OPEN_WEBUI_IMAGE}
    container_name: nvidia-ai-hub-openwebui-rag
    depends_on:
      - qdrant
    ports:
      - "${OPEN_WEBUI_PORT}:8080"
    volumes:
      - ./data/open-webui:/app/backend/data
    environment:
      WEBUI_SECRET_KEY: ${WEBUI_SECRET_KEY}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL}
      RAG_OLLAMA_BASE_URL: ${RAG_OLLAMA_BASE_URL}
      VECTOR_DB: ${VECTOR_DB}
      QDRANT_URI: ${QDRANT_URI}
      QDRANT_ON_DISK: ${QDRANT_ON_DISK}
      QDRANT_PREFER_GRPC: ${QDRANT_PREFER_GRPC}
      QDRANT_GRPC_PORT: ${QDRANT_GRPC_PORT}
      QDRANT_TIMEOUT: ${QDRANT_TIMEOUT}
      QDRANT_COLLECTION_PREFIX: ${QDRANT_COLLECTION_PREFIX}
      RAG_EMBEDDING_ENGINE: ${RAG_EMBEDDING_ENGINE}
      RAG_EMBEDDING_MODEL: ${RAG_EMBEDDING_MODEL}
      RAG_RERANKING_MODEL: ${RAG_RERANKING_MODEL}
      CONTENT_EXTRACTION_ENGINE: ${CONTENT_EXTRACTION_ENGINE}
      HF_HUB_OFFLINE: ${HF_HUB_OFFLINE}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
