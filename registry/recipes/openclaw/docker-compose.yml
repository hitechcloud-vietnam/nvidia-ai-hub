services:
  openclaw:
    image: ghcr.io/openclaw/openclaw:latest
    container_name: spark-ai-hub-openclaw
    user: "0:0"
    env_file:
      - .env
    environment:
      HOME: /home/node
      NODE_ENV: production
      TERM: xterm-256color
      OPENCLAW_GATEWAY_BIND: ${OPENCLAW_GATEWAY_BIND:-lan}
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN:-change-me-openclaw-token}
      OPENCLAW_SKIP_CHANNELS: "1"
      OPENCLAW_SKIP_GMAIL_WATCHER: "1"
      OPENCLAW_SKIP_CRON: "1"
      OPENCLAW_SKIP_CANVAS_HOST: "1"
    ports:
      - "18789:18789"
    volumes:
      - ./data/openclaw:/home/node/.openclaw
    command:
      - /bin/sh
      - -lc
      - |
        set -eu
        mkdir -p /home/node/.openclaw/workspace /home/node/.openclaw/canvas /home/node/.openclaw/cron
        if [ ! -f /home/node/.openclaw/openclaw.json ]; then
          cat >/home/node/.openclaw/openclaw.json <<EOF
        {
          "gateway": {
            "mode": "local",
            "bind": "${OPENCLAW_GATEWAY_BIND:-lan}",
            "port": 18789,
            "auth": {
              "mode": "token",
              "token": "${OPENCLAW_GATEWAY_TOKEN:-change-me-openclaw-token}"
            },
            "controlUi": {
              "allowedOrigins": [
                "http://127.0.0.1:18789",
                "http://localhost:18789"
              ]
            }
          }
        }
        EOF
        fi
        chown -R node:node /home/node/.openclaw
        chmod 700 /home/node/.openclaw /home/node/.openclaw/workspace
        chmod 600 /home/node/.openclaw/openclaw.json
        exec su -s /bin/sh node -c "node openclaw.mjs gateway --bind ${OPENCLAW_GATEWAY_BIND:-lan} --port 18789 --allow-unconfigured"
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - fetch('http://127.0.0.1:18789/healthz').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 30s
    restart: unless-stopped