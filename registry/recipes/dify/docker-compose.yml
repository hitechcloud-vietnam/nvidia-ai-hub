services:
  init_permissions:
    image: busybox:1.37.0
    container_name: nvidia-ai-hub-dify-init
    command:
      - sh
      - -c
      - |
        mkdir -p /app/api/storage /app/plugin/storage &&
        chown -R 1001:1001 /app/api/storage /app/plugin/storage
    volumes:
      - ./data/storage:/app/api/storage
      - ./data/plugin_daemon:/app/plugin/storage
    restart: "no"

  db_postgres:
    image: postgres:15-alpine
    container_name: nvidia-ai-hub-dify-postgres
    env_file:
      - ./.env
    environment:
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change-me-dify-postgres}
      POSTGRES_DB: ${DB_DATABASE:-dify}
      PGDATA: ${PGDATA:-/var/lib/postgresql/data/pgdata}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD",
          "pg_isready",
          "-h",
          "db_postgres",
          "-U",
          "${DB_USERNAME:-postgres}",
          "-d",
          "${DB_DATABASE:-dify}",
        ]
      interval: 5s
      timeout: 5s
      retries: 30
    restart: unless-stopped

  redis:
    image: redis:6-alpine
    container_name: nvidia-ai-hub-dify-redis
    env_file:
      - ./.env
    environment:
      REDISCLI_AUTH: ${REDIS_PASSWORD:-change-me-dify-redis}
    command: redis-server --requirepass ${REDIS_PASSWORD:-change-me-dify-redis}
    volumes:
      - ./data/redis:/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "redis-cli -a ${REDIS_PASSWORD:-change-me-dify-redis} ping | grep -q PONG",
        ]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  weaviate:
    image: semitechnologies/weaviate:1.27.0
    container_name: nvidia-ai-hub-dify-weaviate
    env_file:
      - ./.env
    environment:
      PERSISTENCE_DATA_PATH: ${WEAVIATE_PERSISTENCE_DATA_PATH:-/var/lib/weaviate}
      QUERY_DEFAULTS_LIMIT: ${WEAVIATE_QUERY_DEFAULTS_LIMIT:-25}
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: ${WEAVIATE_AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED:-true}
      DEFAULT_VECTORIZER_MODULE: ${WEAVIATE_DEFAULT_VECTORIZER_MODULE:-none}
      CLUSTER_HOSTNAME: ${WEAVIATE_CLUSTER_HOSTNAME:-node1}
      AUTHENTICATION_APIKEY_ENABLED: ${WEAVIATE_AUTHENTICATION_APIKEY_ENABLED:-true}
      AUTHENTICATION_APIKEY_ALLOWED_KEYS: ${WEAVIATE_AUTHENTICATION_APIKEY_ALLOWED_KEYS:-change-me-dify-weaviate}
      AUTHENTICATION_APIKEY_USERS: ${WEAVIATE_AUTHENTICATION_APIKEY_USERS:-hello@local.dify}
      AUTHORIZATION_ADMINLIST_ENABLED: ${WEAVIATE_AUTHORIZATION_ADMINLIST_ENABLED:-true}
      AUTHORIZATION_ADMINLIST_USERS: ${WEAVIATE_AUTHORIZATION_ADMINLIST_USERS:-hello@local.dify}
      DISABLE_TELEMETRY: ${WEAVIATE_DISABLE_TELEMETRY:-false}
    volumes:
      - ./data/weaviate:/var/lib/weaviate
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/v1/.well-known/ready"]
      interval: 10s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  sandbox:
    image: langgenius/dify-sandbox:${DIFY_SANDBOX_VERSION:-0.2.14}
    container_name: nvidia-ai-hub-dify-sandbox
    env_file:
      - ./.env
    environment:
      API_KEY: ${SANDBOX_API_KEY:-change-me-dify-sandbox}
      GIN_MODE: ${SANDBOX_GIN_MODE:-release}
      WORKER_TIMEOUT: ${SANDBOX_WORKER_TIMEOUT:-15}
      ENABLE_NETWORK: ${SANDBOX_ENABLE_NETWORK:-false}
      HTTP_PROXY: ${SANDBOX_HTTP_PROXY:-}
      HTTPS_PROXY: ${SANDBOX_HTTPS_PROXY:-}
      SANDBOX_PORT: ${SANDBOX_PORT:-8194}
      PIP_MIRROR_URL: ${PIP_MIRROR_URL:-}
    volumes:
      - ./data/sandbox/dependencies:/dependencies
      - ./data/sandbox/conf:/conf
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8194/health"]
      interval: 15s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  plugin_daemon:
    image: langgenius/dify-plugin-daemon:${DIFY_PLUGIN_DAEMON_VERSION:-0.5.3-local}
    container_name: nvidia-ai-hub-dify-plugin-daemon
    env_file:
      - ./.env
    environment:
      DB_HOST: ${DB_HOST:-db_postgres}
      DB_PORT: ${DB_PORT:-5432}
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-change-me-dify-postgres}
      DB_DATABASE: ${DB_PLUGIN_DATABASE:-dify}
      SERVER_PORT: ${PLUGIN_DAEMON_PORT:-5002}
      SERVER_KEY: ${PLUGIN_DAEMON_KEY:-change-me-dify-plugin-daemon-key}
      MAX_PLUGIN_PACKAGE_SIZE: ${PLUGIN_MAX_PACKAGE_SIZE:-52428800}
      PPROF_ENABLED: ${PLUGIN_PPROF_ENABLED:-false}
      DIFY_INNER_API_URL: ${PLUGIN_DIFY_INNER_API_URL:-http://api:5001}
      DIFY_INNER_API_KEY: ${PLUGIN_DIFY_INNER_API_KEY:-change-me-dify-inner-api-key}
      PLUGIN_REMOTE_INSTALLING_HOST: ${PLUGIN_DEBUGGING_HOST:-0.0.0.0}
      PLUGIN_REMOTE_INSTALLING_PORT: ${PLUGIN_DEBUGGING_PORT:-5003}
      PLUGIN_WORKING_PATH: ${PLUGIN_WORKING_PATH:-/app/storage/cwd}
      FORCE_VERIFYING_SIGNATURE: ${FORCE_VERIFYING_SIGNATURE:-true}
      PYTHON_ENV_INIT_TIMEOUT: ${PLUGIN_PYTHON_ENV_INIT_TIMEOUT:-120}
      PLUGIN_MAX_EXECUTION_TIMEOUT: ${PLUGIN_MAX_EXECUTION_TIMEOUT:-600}
      PLUGIN_STDIO_BUFFER_SIZE: ${PLUGIN_STDIO_BUFFER_SIZE:-1024}
      PLUGIN_STDIO_MAX_BUFFER_SIZE: ${PLUGIN_STDIO_MAX_BUFFER_SIZE:-5242880}
      PLUGIN_STORAGE_TYPE: ${PLUGIN_STORAGE_TYPE:-local}
      PLUGIN_STORAGE_LOCAL_ROOT: ${PLUGIN_STORAGE_LOCAL_ROOT:-/app/storage}
      PLUGIN_INSTALLED_PATH: ${PLUGIN_INSTALLED_PATH:-plugin}
      PLUGIN_PACKAGE_CACHE_PATH: ${PLUGIN_PACKAGE_CACHE_PATH:-plugin_packages}
      PLUGIN_MEDIA_CACHE_PATH: ${PLUGIN_MEDIA_CACHE_PATH:-assets}
      SENTRY_ENABLED: ${PLUGIN_SENTRY_ENABLED:-false}
      SENTRY_DSN: ${PLUGIN_SENTRY_DSN:-}
    depends_on:
      db_postgres:
        condition: service_healthy
    volumes:
      - ./data/plugin_daemon:/app/storage
    restart: unless-stopped

  api:
    image: langgenius/dify-api:${DIFY_VERSION:-1.13.3}
    container_name: nvidia-ai-hub-dify-api
    env_file:
      - ./.env
    environment:
      MODE: api
      SENTRY_DSN: ${API_SENTRY_DSN:-}
      SENTRY_TRACES_SAMPLE_RATE: ${API_SENTRY_TRACES_SAMPLE_RATE:-1.0}
      SENTRY_PROFILES_SAMPLE_RATE: ${API_SENTRY_PROFILES_SAMPLE_RATE:-1.0}
      INNER_API_KEY_FOR_PLUGIN: ${PLUGIN_DIFY_INNER_API_KEY:-change-me-dify-inner-api-key}
      PLUGIN_REMOTE_INSTALL_HOST: ${PLUGIN_DEBUGGING_HOST:-0.0.0.0}
      PLUGIN_REMOTE_INSTALL_PORT: ${PLUGIN_DEBUGGING_PORT:-5003}
    depends_on:
      init_permissions:
        condition: service_completed_successfully
      db_postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      weaviate:
        condition: service_healthy
      sandbox:
        condition: service_healthy
      plugin_daemon:
        condition: service_started
    ports:
      - "${API_HOST_PORT:-5001}:5001"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./data/storage:/app/api/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  worker:
    image: langgenius/dify-api:${DIFY_VERSION:-1.13.3}
    container_name: nvidia-ai-hub-dify-worker
    env_file:
      - ./.env
    environment:
      MODE: worker
      SENTRY_DSN: ${API_SENTRY_DSN:-}
      SENTRY_TRACES_SAMPLE_RATE: ${API_SENTRY_TRACES_SAMPLE_RATE:-1.0}
      SENTRY_PROFILES_SAMPLE_RATE: ${API_SENTRY_PROFILES_SAMPLE_RATE:-1.0}
      INNER_API_KEY_FOR_PLUGIN: ${PLUGIN_DIFY_INNER_API_KEY:-change-me-dify-inner-api-key}
    depends_on:
      init_permissions:
        condition: service_completed_successfully
      db_postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      weaviate:
        condition: service_healthy
      sandbox:
        condition: service_healthy
      api:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./data/storage:/app/api/storage
    restart: unless-stopped

  worker_beat:
    image: langgenius/dify-api:${DIFY_VERSION:-1.13.3}
    container_name: nvidia-ai-hub-dify-worker-beat
    env_file:
      - ./.env
    environment:
      MODE: beat
    depends_on:
      init_permissions:
        condition: service_completed_successfully
      db_postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      weaviate:
        condition: service_healthy
      api:
        condition: service_healthy
    restart: unless-stopped

  web:
    image: langgenius/dify-web:${DIFY_VERSION:-1.13.3}
    container_name: nvidia-ai-hub-dify-web
    env_file:
      - ./.env
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${WEB_HOST_PORT:-3081}:3000"
    restart: unless-stopped