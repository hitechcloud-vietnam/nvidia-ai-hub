name: "Diffusers Playground"
slug: diffusers-playground
version: "1.0.0"
description: "Run a local Gradio playground powered by the official Hugging Face Diffusers library for text-to-image, image-to-image, and inpainting workflows on NVIDIA GPUs with persistent model cache and exported outputs."
author: "Hugging Face"
source: "official"
website: "https://github.com/huggingface/diffusers"
upstream: "https://github.com/huggingface/diffusers"
category: image-gen
categories:
  - image-gen
  - image-edit
  - workflow
tags:
  - diffusers
  - stable-diffusion
  - text-to-image
  - image-to-image
  - inpainting
  - gradio
  - hugging-face
icon: "🎨"
logo: ""
requirements:
  min_memory_gb: 24
  recommended_memory_gb: 48
  disk_gb: 80
  cuda_compute: "12.1"
ui:
  type: web
  port: 7871
  path: "/"
  health_path: "/"
docker:
  build: true
  build_time_minutes: 15
  gpu: true
status: experimental
release_date: "2022-09"
runtime_env_path: "registry/recipes/diffusers-playground/.env"
requires_hf_token: false
commands:
  - label: "Install / build / launch"
    description: "Build the local Diffusers playground image and launch the Gradio UI on port 7871."
    command: "docker compose -p nvidia-ai-hub-diffusers-playground -f registry/recipes/diffusers-playground/docker-compose.yml up -d --build"
  - label: "Stop"
    description: "Stop Diffusers Playground while preserving model cache and generated outputs."
    command: "docker compose -p nvidia-ai-hub-diffusers-playground -f registry/recipes/diffusers-playground/docker-compose.yml down"
