services:
  postgres:
    image: ${POSTGRES_IMAGE:-postgres:16-alpine}
    container_name: nvidia-ai-hub-langfuse-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-langfuse}
      POSTGRES_USER: ${POSTGRES_USER:-langfuse}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me-langfuse-postgres}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-langfuse} -d ${POSTGRES_DB:-langfuse}"]
      interval: 10s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  clickhouse:
    image: ${CLICKHOUSE_IMAGE:-clickhouse/clickhouse-server:24.12}
    container_name: nvidia-ai-hub-langfuse-clickhouse
    environment:
      CLICKHOUSE_DB: ${CLICKHOUSE_DB:-langfuse}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-default}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-change-me-langfuse-clickhouse}
    volumes:
      - ./data/clickhouse:/var/lib/clickhouse
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:8123/ping || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  redis:
    image: ${REDIS_IMAGE:-redis:7-alpine}
    container_name: nvidia-ai-hub-langfuse-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-change-me-langfuse-redis}
    volumes:
      - ./data/redis:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a ${REDIS_PASSWORD:-change-me-langfuse-redis} ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  minio:
    image: ${MINIO_IMAGE:-minio/minio:RELEASE.2025-02-18T16-25-55Z}
    container_name: nvidia-ai-hub-langfuse-minio
    command: server /data --console-address :9001
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-langfuse}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-change-me-langfuse-minio}
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - ./data/minio:/data
    restart: unless-stopped

  langfuse-web:
    image: ${LANGFUSE_IMAGE:-langfuse/langfuse:latest}
    container_name: nvidia-ai-hub-langfuse-web
    depends_on:
      postgres:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-langfuse}:${POSTGRES_PASSWORD:-change-me-langfuse-postgres}@postgres:5432/${POSTGRES_DB:-langfuse}
      DIRECT_URL: postgresql://${POSTGRES_USER:-langfuse}:${POSTGRES_PASSWORD:-change-me-langfuse-postgres}@postgres:5432/${POSTGRES_DB:-langfuse}
      CLICKHOUSE_MIGRATION_URL: clickhouse://clickhouse:9000
      CLICKHOUSE_URL: http://clickhouse:8123
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-default}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-change-me-langfuse-clickhouse}
      CLICKHOUSE_DB: ${CLICKHOUSE_DB:-langfuse}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_AUTH: ${REDIS_PASSWORD:-change-me-langfuse-redis}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3001}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-change-me-langfuse-nextauth-secret}
      SALT: ${SALT:-change-me-langfuse-salt}
      TELEMETRY_ENABLED: ${TELEMETRY_ENABLED:-false}
      LANGFUSE_S3_EVENT_UPLOAD_BUCKET: ${MINIO_BUCKET:-langfuse}
      LANGFUSE_S3_MEDIA_UPLOAD_BUCKET: ${MINIO_BUCKET:-langfuse}
      LANGFUSE_S3_BATCH_EXPORT_BUCKET: ${MINIO_BUCKET:-langfuse}
      LANGFUSE_S3_ENDPOINT: http://minio:9000
      LANGFUSE_S3_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-langfuse}
      LANGFUSE_S3_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-change-me-langfuse-minio}
      LANGFUSE_S3_FORCE_PATH_STYLE: true
      LANGFUSE_S3_REGION: us-east-1
      LANGFUSE_INIT_ORG_ID: ${LANGFUSE_INIT_ORG_ID:-}
      LANGFUSE_INIT_ORG_NAME: ${LANGFUSE_INIT_ORG_NAME:-}
      LANGFUSE_INIT_PROJECT_ID: ${LANGFUSE_INIT_PROJECT_ID:-}
      LANGFUSE_INIT_PROJECT_NAME: ${LANGFUSE_INIT_PROJECT_NAME:-}
      LANGFUSE_INIT_PROJECT_PUBLIC_KEY: ${LANGFUSE_INIT_PROJECT_PUBLIC_KEY:-}
      LANGFUSE_INIT_PROJECT_SECRET_KEY: ${LANGFUSE_INIT_PROJECT_SECRET_KEY:-}
    ports:
      - "${LANGFUSE_HOST_PORT:-3001}:3000"
    restart: unless-stopped

  langfuse-worker:
    image: ${LANGFUSE_IMAGE:-langfuse/langfuse:latest}
    container_name: nvidia-ai-hub-langfuse-worker
    depends_on:
      postgres:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["sh", "-lc", "node worker.js"]
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-langfuse}:${POSTGRES_PASSWORD:-change-me-langfuse-postgres}@postgres:5432/${POSTGRES_DB:-langfuse}
      DIRECT_URL: postgresql://${POSTGRES_USER:-langfuse}:${POSTGRES_PASSWORD:-change-me-langfuse-postgres}@postgres:5432/${POSTGRES_DB:-langfuse}
      CLICKHOUSE_MIGRATION_URL: clickhouse://clickhouse:9000
      CLICKHOUSE_URL: http://clickhouse:8123
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-default}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-change-me-langfuse-clickhouse}
      CLICKHOUSE_DB: ${CLICKHOUSE_DB:-langfuse}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_AUTH: ${REDIS_PASSWORD:-change-me-langfuse-redis}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-change-me-langfuse-nextauth-secret}
      SALT: ${SALT:-change-me-langfuse-salt}
      TELEMETRY_ENABLED: ${TELEMETRY_ENABLED:-false}
      LANGFUSE_S3_EVENT_UPLOAD_BUCKET: ${MINIO_BUCKET:-langfuse}
      LANGFUSE_S3_MEDIA_UPLOAD_BUCKET: ${MINIO_BUCKET:-langfuse}
      LANGFUSE_S3_BATCH_EXPORT_BUCKET: ${MINIO_BUCKET:-langfuse}
      LANGFUSE_S3_ENDPOINT: http://minio:9000
      LANGFUSE_S3_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-langfuse}
      LANGFUSE_S3_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-change-me-langfuse-minio}
      LANGFUSE_S3_FORCE_PATH_STYLE: true
      LANGFUSE_S3_REGION: us-east-1
    restart: unless-stopped
