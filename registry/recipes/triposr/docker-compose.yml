services:
  triposr:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nvidia-ai-hub-triposr
    ports:
      - "7870:7860"
    env_file:
      - .env
    environment:
      HF_HOME: "${HF_HOME:-/root/.cache/huggingface}"
      GRADIO_SERVER_PORT: "${GRADIO_SERVER_PORT:-7860}"
      GRADIO_SERVER_NAME: "${GRADIO_SERVER_NAME:-0.0.0.0}"
      TRIPOSR_ARGS: "${TRIPOSR_ARGS:-}"
    volumes:
      - triposr-hf-cache:/root/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped

volumes:
  triposr-hf-cache:
