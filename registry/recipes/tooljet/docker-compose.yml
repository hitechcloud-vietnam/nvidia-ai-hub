services:
  postgres:
    image: ${POSTGRES_IMAGE:-postgres:16}
    container_name: nvidia-ai-hub-tooljet-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_SUPERUSER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_SUPERUSER_PASSWORD:-change-me-tooljet-postgres-superuser}
      POSTGRES_DB: ${PG_DB:-tooljet}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
      - ./initdb:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_SUPERUSER:-postgres} -d ${PG_DB:-tooljet}"]
      interval: 10s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  tooljet:
    image: ${TOOLJET_IMAGE:-tooljet/tooljet:latest}
    container_name: nvidia-ai-hub-tooljet
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      TOOLJET_HOST: ${TOOLJET_HOST:-http://localhost:3013}
      PG_HOST: postgres
      PG_PORT: 5432
      PG_USER: ${PG_USER:-tooljet}
      PG_PASS: ${PG_PASS:-change-me-tooljet-postgres}
      PG_DB: ${PG_DB:-tooljet}
      TOOLJET_DB: ${TOOLJET_DB:-tooljet_db}
      SECRET_KEY_BASE: ${SECRET_KEY_BASE:-change-me-tooljet-secret-key-base}
      LOCKBOX_MASTER_KEY: ${LOCKBOX_MASTER_KEY:-change-me-tooljet-lockbox-master-key}
    ports:
      - "${TOOLJET_HOST_PORT:-3013}:80"
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1/ || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 20
      start_period: 45s
    restart: unless-stopped
