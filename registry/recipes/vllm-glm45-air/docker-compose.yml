services:
  vllm:
    image: vllm/vllm-openai:v0.20.0-aarch64-cu130
    container_name: nvidia-ai-hub-vllm-glm45-air
    ports:
      - "9001:8000"
    volumes:
      - huggingface-cache:/root/.cache/huggingface
    environment:
      - HF_HUB_OFFLINE=${HF_HUB_OFFLINE:-0}
      - TRANSFORMERS_OFFLINE=${TRANSFORMERS_OFFLINE:-0}
      - VLLM_ATTENTION_BACKEND=${VLLM_ATTENTION_BACKEND:-XFORMERS}
    ipc: host
    command:
      - --model
      - zai-org/GLM-4.5-Air
      - --port
      - "8000"
      - --tensor-parallel-size
      - "8"
      - --max-model-len
      - "131072"
      - --enable-prefix-caching
      - --enable-auto-tool-choice
      - --tool-call-parser
      - glm45
      - --reasoning-parser
      - glm45
      - --gpu-memory-utilization
      - "0.72"
      - --served-model-name
      - glm-4.5-air
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped

volumes:
  huggingface-cache:
