services:
  vllm:
    image: vllm/vllm-openai:v0.20.0-aarch64-cu130
    container_name: nvidia-ai-hub-vllm-deepseek-v2-lite-chat
    ports:
      - "9001:8000"
    volumes:
      - huggingface-cache:/root/.cache/huggingface
    environment:
      - HF_HUB_OFFLINE=${HF_HUB_OFFLINE:-0}
      - TRANSFORMERS_OFFLINE=${TRANSFORMERS_OFFLINE:-0}
      - VLLM_ALLOW_LONG_MAX_MODEL_LEN=${VLLM_ALLOW_LONG_MAX_MODEL_LEN:-1}
    ipc: host
    command:
      - --model
      - deepseek-ai/DeepSeek-V2-Lite-Chat
      - --port
      - "8000"
      - --trust-remote-code
      - --max-model-len
      - "163840"
      - --enable-prefix-caching
      - --gpu-memory-utilization
      - "0.40"
      - --served-model-name
      - deepseek-v2-lite-chat
      - --enforce-eager
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped

volumes:
  huggingface-cache:
