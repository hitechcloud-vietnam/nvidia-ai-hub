name: "Neo4j Knowledge Graph Agent"
slug: neo4j-knowledge-graph-agent
version: "1.0.0"
description: "Neo4j graph database preset with Neo4j Browser, APOC plugin bootstrap, persistent graph storage, and shared Ollama-adjacent integration points for local knowledge graph and graph-RAG experiments on NVIDIA GPUs."
author: "Neo4j"
source: "official"
website: "https://neo4j.com/"
upstream: "https://github.com/neo4j/docker-neo4j"
category: llm
categories:
  - rag
  - graph
  - analytics
tags:
  - neo4j
  - knowledge-graph
  - graph-rag
  - cypher
  - apoc
  - ollama
icon: "🕸️"
logo: ""
requirements:
  min_memory_gb: 8
  recommended_memory_gb: 16
  disk_gb: 25
  cuda_compute: "12.1"
ui:
  type: web
  port: 3094
  path: "/browser/"
  health_path: "/"
docker:
  build: false
  build_time_minutes: 5
  gpu: false
status: experimental
release_date: "2007-02"
runtime_env_path: "registry/recipes/neo4j-knowledge-graph-agent/.env"
requires_hf_token: false
depends_on:
  - ollama-runtime
integration:
  api_url: "bolt://<NVIDIA_AI_HUB_IP>:7688"
  model_id: "Graph schema, extraction pipelines, and LLM orchestration are configured by the connected application"
  api_key: "Use the Neo4j username and password from the recipe environment file"
  max_context: "Depends on the graph-RAG application connected to Neo4j"
  max_output_tokens: "Depends on the graph-RAG application connected to Neo4j"
  curl_example: "curl -u neo4j:<NEO4J_PASSWORD> http://<NVIDIA_AI_HUB_IP>:7475/browser/"
commands:
  - label: "Install / launch"
    description: "Start Neo4j Community with Browser, APOC plugin bootstrap, persistent graph storage, and local import directories for knowledge graph experiments."
    command: "docker compose --env-file registry/recipes/neo4j-knowledge-graph-agent/.env -p nvidia-ai-hub-neo4j-graph -f registry/recipes/neo4j-knowledge-graph-agent/docker-compose.yml up -d"
  - label: "Stop"
    description: "Stop Neo4j while preserving graph data, logs, plugins, and import assets."
    command: "docker compose --env-file registry/recipes/neo4j-knowledge-graph-agent/.env -p nvidia-ai-hub-neo4j-graph -f registry/recipes/neo4j-knowledge-graph-agent/docker-compose.yml down"