services:
  voicecraft-lab:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nvidia-ai-hub-voicecraft-lab
    env_file:
      - .env
    environment:
      PORT: ${PORT:-7860}
      DEMO_PATH: ${DEMO_PATH:-/opt/voicecraft/demo}
      TMP_PATH: ${TMP_PATH:-/data/temp}
      MODELS_PATH: ${MODELS_PATH:-/data/models}
      HF_HOME: ${HF_HOME:-/data/hf-cache}
      XDG_CACHE_HOME: ${XDG_CACHE_HOME:-/data/cache}
      TORCH_HOME: ${TORCH_HOME:-/data/torch-cache}
      GRADIO_TEMP_DIR: ${GRADIO_TEMP_DIR:-/data/gradio}
      NLTK_DATA: ${NLTK_DATA:-/data/nltk}
      MPLCONFIGDIR: ${MPLCONFIGDIR:-/data/matplotlib}
    ports:
      - "${HOST_PORT:-7886}:${PORT:-7860}"
    volumes:
      - ./data/temp:/data/temp
      - ./data/models:/data/models
      - ./data/hf-cache:/data/hf-cache
      - ./data/cache:/data/cache
      - ./data/torch-cache:/data/torch-cache
      - ./data/gradio:/data/gradio
      - ./data/nltk:/data/nltk
      - ./data/matplotlib:/data/matplotlib
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped
