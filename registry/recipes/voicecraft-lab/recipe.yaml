name: "VoiceCraft Lab"
slug: voicecraft-lab
version: "1.0.0"
description: "Run the official VoiceCraft Gradio app on NVIDIA GPUs for zero-shot text-to-speech, speech editing, and long-form rerun workflows with persistent model and cache storage."
author: "Puyuan Peng"
source: "official"
website: "https://github.com/jasonppy/VoiceCraft"
upstream: "https://github.com/jasonppy/VoiceCraft"
category: speech
categories:
  - speech
  - workflow
tags:
  - tts
  - speech
  - audio
  - gradio
  - voice-cloning
  - speech-editing
  - long-form
icon: "🧪"
logo: "/logos/speech.png"
requirements:
  min_memory_gb: 16
  recommended_memory_gb: 32
  disk_gb: 35
  cuda_compute: "12.1"
ui:
  type: web
  port: 7886
  path: "/"
  health_path: "/"
docker:
  build: true
  build_time_minutes: 30
  gpu: true
status: experimental
runtime_env_path: "registry/recipes/voicecraft-lab/.env"
requires_hf_token: false
commands:
  - label: "Install / build / launch"
    description: "Build the official VoiceCraft environment with Montreal Forced Aligner and launch the Gradio studio on port 7886."
    command: "docker compose -p nvidia-ai-hub-voicecraft-lab -f registry/recipes/voicecraft-lab/docker-compose.yml up -d --build"
  - label: "Stop"
    description: "Stop VoiceCraft Lab while preserving downloaded models, alignment assets, and local caches."
    command: "docker compose -p nvidia-ai-hub-voicecraft-lab -f registry/recipes/voicecraft-lab/docker-compose.yml down"
