services:
  postgres:
    image: ${POSTGRES_IMAGE:-pgvector/pgvector:pg16}
    container_name: nvidia-ai-hub-lobehub-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-lobehub}
      POSTGRES_USER: ${POSTGRES_USER:-lobehub}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me-lobehub-postgres}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lobehub} -d ${POSTGRES_DB:-lobehub}"]
      interval: 10s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  redis:
    image: ${REDIS_IMAGE:-redis:7-alpine}
    container_name: nvidia-ai-hub-lobehub-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-change-me-lobehub-redis}
    volumes:
      - ./data/redis:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a ${REDIS_PASSWORD:-change-me-lobehub-redis} ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  rustfs:
    image: ${RUSTFS_IMAGE:-rustfs/rustfs:latest}
    container_name: nvidia-ai-hub-lobehub-rustfs
    command: server /data --console-address :9001
    environment:
      RUSTFS_ACCESS_KEY: ${S3_ACCESS_KEY:-lobehub}
      RUSTFS_SECRET_KEY: ${S3_SECRET_KEY:-change-me-lobehub-s3-secret}
    ports:
      - "9000:9000"
      - "${RUSTFS_CONSOLE_PORT:-9001}:9001"
    volumes:
      - ./data/rustfs:/data
    restart: unless-stopped

  lobehub:
    image: ${LOBEHUB_IMAGE:-lobehub/lobehub:latest}
    container_name: nvidia-ai-hub-lobehub
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rustfs:
        condition: service_started
    environment:
      APP_URL: ${APP_URL:-http://localhost:3210}
      DATABASE_URL: ${DATABASE_URL:-postgresql://lobehub:change-me-lobehub-postgres@postgres:5432/lobehub}
      REDIS_URL: ${REDIS_URL:-redis://:change-me-lobehub-redis@redis:6379/0}
      KEY_VAULTS_SECRET: ${KEY_VAULTS_SECRET:-change-me-lobehub-key-vault-secret}
      S3_ENDPOINT: ${S3_ENDPOINT:-http://rustfs:9000}
      S3_BUCKET: ${S3_BUCKET:-lobehub}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-lobehub}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-change-me-lobehub-s3-secret}
      S3_PUBLIC_DOMAIN: ${S3_PUBLIC_DOMAIN:-http://localhost:9000}
    ports:
      - "${LOBEHUB_HOST_PORT:-3210}:3210"
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:3210/ || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 20
      start_period: 60s
    restart: unless-stopped
