services:
  trellis2:
    image: abelpc/trellis2-spark:v2.0
    container_name: nvidia-ai-hub-trellis2
    ports:
      - "12156:12156"
    volumes:
      - trellis2-hf-cache:/workspace/cache/huggingface
      - trellis2-triton-cache:/workspace/cache/triton
      - trellis2-torch-cache:/workspace/cache/torch
    environment:
      GRADIO_SERVER_NAME: "0.0.0.0"
      GRADIO_SERVER_PORT: "12156"
      HF_HOME: "/workspace/cache/huggingface"
      TRITON_CACHE_DIR: "/workspace/cache/triton"
      TORCH_HOME: "/workspace/cache/torch"
      ATTN_BACKEND: "flash-attn"
      HF_TOKEN: "${HF_TOKEN:-}"
      HF_HUB_OFFLINE: "${HF_HUB_OFFLINE:-0}"
      TRANSFORMERS_OFFLINE: "${TRANSFORMERS_OFFLINE:-0}"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped

volumes:
  trellis2-hf-cache:
  trellis2-triton-cache:
  trellis2-torch-cache:
