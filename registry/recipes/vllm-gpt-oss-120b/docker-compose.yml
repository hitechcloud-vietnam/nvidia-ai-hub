services:
  vllm:
    image: nvcr.io/nvidia/vllm:26.02-py3
    container_name: nvidia-ai-hubb-vllm-gpt-oss-120b
    ports:
      - "9001:8000"
    volumes:
      - huggingface-cache:/root/.cache/huggingface
    environment:
      - HF_HUB_OFFLINE=${HF_HUB_OFFLINE:-0}
      - TRANSFORMERS_OFFLINE=${TRANSFORMERS_OFFLINE:-0}
    ipc: host
    command:
      - vllm
      - serve
      - openai/gpt-oss-120b
      - --port
      - "8000"
      - --max-model-len
      - "131072"
      - --enable-prefix-caching
      - --kv-cache-dtype
      - fp8_e4m3
      - --gpu-memory-utilization
      - "0.75"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped

volumes:
  huggingface-cache:
