services:
  postgres:
    image: ${POSTGRES_IMAGE:-postgres:16}
    container_name: nvidia-ai-hub-formbricks-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-formbricks}
      POSTGRES_USER: ${POSTGRES_USER:-formbricks}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me-formbricks-postgres-password}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-formbricks} -d ${POSTGRES_DB:-formbricks}"]
      interval: 10s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  redis:
    image: ${REDIS_IMAGE:-redis:7-alpine}
    container_name: nvidia-ai-hub-formbricks-redis
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:-change-me-formbricks-redis-password}"]
    volumes:
      - ./data/redis:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a ${REDIS_PASSWORD:-change-me-formbricks-redis-password} ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  formbricks:
    image: ${FORMBRICKS_IMAGE:-ghcr.io/formbricks/formbricks:latest}
    container_name: nvidia-ai-hub-formbricks
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      WEBAPP_URL: ${WEBAPP_URL:-http://localhost:3000}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      DATABASE_URL: postgresql://${POSTGRES_USER:-formbricks}:${POSTGRES_PASSWORD:-change-me-formbricks-postgres-password}@postgres:5432/${POSTGRES_DB:-formbricks}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-change-me-formbricks-nextauth-secret-32-chars}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-change-me-formbricks-encryption-key-32-chars}
      CRON_SECRET: ${CRON_SECRET:-change-me-formbricks-cron-secret-32-chars}
      REDIS_URL: redis://:${REDIS_PASSWORD:-change-me-formbricks-redis-password}@redis:6379
    ports:
      - "${FORMBRICKS_HOST_PORT:-3000}:3000"
    volumes:
      - ./data/uploads:/home/nextjs/apps/web/uploads
    restart: unless-stopped
