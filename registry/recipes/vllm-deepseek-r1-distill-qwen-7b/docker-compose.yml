services:
  vllm:
    image: vllm/vllm-openai:v0.17.1-aarch64-cu130
    container_name: spark-ai-hub-vllm-deepseek-r1-distill-qwen-7b
    ports:
      - "9001:8000"
    volumes:
      - huggingface-cache:/root/.cache/huggingface
    environment:
      - HF_HUB_OFFLINE=${HF_HUB_OFFLINE:-0}
      - TRANSFORMERS_OFFLINE=${TRANSFORMERS_OFFLINE:-0}
    ipc: host
    command:
      - --model
      - deepseek-ai/DeepSeek-R1-Distill-Qwen-7B
      - --port
      - "8000"
      - --max-model-len
      - "32768"
      - --enable-prefix-caching
      - --gpu-memory-utilization
      - "0.32"
      - --enforce-eager
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped

volumes:
  huggingface-cache: