name: "Qwen3.5-27B LuceBox DFlash"
slug: lucebox-dflash-27b
version: "1.0.0"
description: "Qwen3.5-27B Q4_K_M with LuceBox DFlash — a custom DDTree speculative decoding engine built on top of llama.cpp. Measured ~32 tok/s avg on DGX Spark GB10 (Blackwell sm_121) across mixed prompts (code-heavy prompts reach ~48 tok/s; open-ended prose ~24 tok/s). Compiled from source on first install for sm_86;120;121, NCCL disabled (single-GPU), DDTree budget 32."
author: "Luce-Org"
source: "community"
website: "https://github.com/Luce-Org/lucebox-hub"
