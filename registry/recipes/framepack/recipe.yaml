name: "FramePack"
slug: framepack
version: "1.0.0"
description: "Run the official FramePack Gradio app on NVIDIA GPUs for image-to-video generation with long progressive video extension, low-VRAM-friendly sampling, and persistent Hugging Face cache plus rendered output storage."
author: "lllyasviel"
source: "official"
website: "https://github.com/lllyasviel/FramePack"
upstream: "https://github.com/lllyasviel/FramePack"
category: video-gen
categories:
  - video-gen
  - image-gen
tags:
  - video-gen
  - image-to-video
  - gradio
  - diffusion
  - framepack
  - hunyuanvideo
  - apache-2.0
icon: "🎞️"
logo: ""
requirements:
  min_memory_gb: 8
  recommended_memory_gb: 24
  disk_gb: 80
  cuda_compute: "12.6"
ui:
  type: web
  port: 7867
  path: "/"
  health_path: "/"
docker:
  build: true
  build_time_minutes: 20
  gpu: true
status: experimental
runtime_env_path: "registry/recipes/framepack/.env"
requires_hf_token: false
commands:
  - label: "Install / build / launch"
    description: "Build the official FramePack environment and start the Gradio image-to-video UI on port 7867 with persistent model cache and output storage."
    command: "docker compose -p nvidia-ai-hub-framepack -f registry/recipes/framepack/docker-compose.yml up -d --build"
  - label: "Stop"
    description: "Stop FramePack while preserving downloaded model assets and generated videos in the Docker volumes."
    command: "docker compose -p nvidia-ai-hub-framepack -f registry/recipes/framepack/docker-compose.yml down"
