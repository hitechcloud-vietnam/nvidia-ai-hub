services:
  ollama:
    image: ${OLLAMA_IMAGE:-ollama/ollama:latest}
    container_name: nvidia-ai-hub-ollama-runtime
    env_file:
      - .env
    environment:
      OLLAMA_KEEP_ALIVE: ${OLLAMA_KEEP_ALIVE:-10m}
    ports:
      - "${OLLAMA_HOST_PORT:-11435}:11434"
    volumes:
      - ./data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped

  ollama-runtime-ui:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nvidia-ai-hub-ollama-runtime-ui
    env_file:
      - .env
    ports:
      - "${OLLAMA_UI_PORT:-3014}:3014"
    environment:
      PORT: "3014"
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
      STARTER_MODEL: ${STARTER_MODEL:-qwen3.5:4b}
      STARTER_DISPLAY_NAME: ${STARTER_DISPLAY_NAME:-Qwen 3.5 4B}
      SHARED_ENDPOINT: ${SHARED_ENDPOINT:-http://host.docker.internal:11435}
    depends_on:
      - ollama
    restart: unless-stopped
