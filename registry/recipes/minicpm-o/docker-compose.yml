services:
  minicpm-o:
    image: ghcr.io/hitechcloud-vietnam/minicpm-o-spark-ai-hub:latest
    container_name: spark-ai-hub-minicpm-o
    ports:
      - "7868:7860"
    env_file:
      - .env
    environment:
      HF_HOME: "/app/hf-cache"
      MINICPM_MODEL: "${MINICPM_MODEL:-openbmb/MiniCPM-o-2_6}"
      HF_TOKEN: "${HF_TOKEN:-}"
      HF_HUB_OFFLINE: "${HF_HUB_OFFLINE:-0}"
      TRANSFORMERS_OFFLINE: "${TRANSFORMERS_OFFLINE:-0}"
    volumes:
      - minicpm-o-hf-cache:/app/hf-cache
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped

volumes:
  minicpm-o-hf-cache:
