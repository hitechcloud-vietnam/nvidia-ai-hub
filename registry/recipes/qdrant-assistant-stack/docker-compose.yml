services:
  qdrant:
    image: ${QDRANT_IMAGE:-qdrant/qdrant:latest}
    container_name: nvidia-ai-hub-qdrant-assistant
    environment:
      QDRANT_ALLOW_RECOVERY_MODE: ${QDRANT_ALLOW_RECOVERY_MODE:-true}
      QDRANT__SERVICE__HTTP_PORT: 6333
      QDRANT__SERVICE__GRPC_PORT: 6334
      QDRANT__SERVICE__API_KEY: ${QDRANT_API_KEY}
    ports:
      - "${QDRANT_HTTP_PORT:-6333}:6333"
      - "${QDRANT_GRPC_PORT:-6334}:6334"
      - "${QDRANT_UI_PORT:-3093}:6333"
    volumes:
      - ./data/storage:/qdrant/storage
      - ./data/snapshots:/qdrant/snapshots
      - ./config/production.yaml:/qdrant/config/production.yaml:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 30s
      timeout: 20s
      retries: 5
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
