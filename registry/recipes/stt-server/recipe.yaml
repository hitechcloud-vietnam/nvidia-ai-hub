description: "Local Faster-Whisper FastAPI server for speech-to-text and translation with word timestamps, VAD filtering, and persistent model cache on NVIDIA GPUs."
author: "SYSTRAN"
source: "official"
website: "https://github.com/SYSTRAN/faster-whisper"
upstream: "https://github.com/SYSTRAN/faster-whisper"
