  - whisper
  - fastapi
  - api
icon: "🎧"
logo: "/logos/whisper.png"
requirements:
  min_memory_gb: 8
  recommended_memory_gb: 16
  disk_gb: 12
  cuda_compute: "12.1"
ui:
  type: web
  port: 7880
  path: "/docs"
  health_path: "/health"
docker:
  build: true
  build_time_minutes: 6
  gpu: true
status: official
