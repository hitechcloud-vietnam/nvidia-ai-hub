services:
  vllm:
    image: nvcr.io/nvidia/vllm:26.03-py3
    container_name: nvidia-ai-hub-vllm-qwen25-vl-7b-nvfp4
    ports:
      - "9001:8000"
    volumes:
      - huggingface-cache:/root/.cache/huggingface
    environment:
      - HF_HUB_OFFLINE=${HF_HUB_OFFLINE:-0}
      - TRANSFORMERS_OFFLINE=${TRANSFORMERS_OFFLINE:-0}
    ipc: host
    command:
      - vllm
      - serve
      - nvidia/Qwen2.5-VL-7B-Instruct-NVFP4
      - --quantization
      - modelopt
      - --port
      - "8000"
      - --max-model-len
      - "32768"
      - --enable-prefix-caching
      - --trust-remote-code
      - --gpu-memory-utilization
      - "0.35"
      - --kv-cache-dtype
      - fp8_e4m3
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped

volumes:
  huggingface-cache:
