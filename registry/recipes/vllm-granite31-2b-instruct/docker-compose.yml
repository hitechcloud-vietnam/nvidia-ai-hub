services:
  vllm:
    image: vllm/vllm-openai:v0.17.1-aarch64-cu130
    container_name: spark-ai-hub-vllm-granite31-2b-instruct
    ports:
      - "9001:8000"
    volumes:
      - huggingface-cache:/root/.cache/huggingface
    environment:
      - HF_HUB_OFFLINE=${HF_HUB_OFFLINE:-0}
      - TRANSFORMERS_OFFLINE=${TRANSFORMERS_OFFLINE:-0}
    ipc: host
    command:
      - --model
      - ibm-granite/granite-3.1-2b-instruct
      - --port
      - "8000"
      - --max-model-len
      - "131072"
      - --enable-prefix-caching
      - --enable-auto-tool-choice
      - --gpu-memory-utilization
      - "0.18"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped

volumes:
  huggingface-cache:
