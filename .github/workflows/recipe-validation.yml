name: Recipe Validation

on:
  pull_request:
    branches: [main]
    paths:
      - 'registry/**'
      - 'scripts/**'
      - '.github/workflows/recipe-validation.yml'
  push:
    branches: [main]
    paths:
      - 'registry/**'
      - 'scripts/**'
      - '.github/workflows/recipe-validation.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: recipe-validation-${{ github.ref }}
  cancel-in-progress: true

jobs:
  recipe-validation:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install backend dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements.txt

      - name: Validate recipe metadata files
        shell: python
        run: |
          from pathlib import Path
          import re
          import yaml

          recipe_files = sorted(Path('registry/recipes').glob('*/recipe.yaml'))
          if not recipe_files:
              raise SystemExit('No recipe.yaml files were found under registry/recipes')

          required_fields = {'name', 'slug', 'description', 'release_date'}
          for recipe_file in recipe_files:
              data = yaml.safe_load(recipe_file.read_text(encoding='utf-8')) or {}
              missing = sorted(field for field in required_fields if not data.get(field))
              if missing:
                  raise SystemExit(f'{recipe_file}: missing required fields: {", ".join(missing)}')
              if data['slug'] != recipe_file.parent.name:
                  raise SystemExit(f'{recipe_file}: slug must match parent directory name')
              if not re.fullmatch(r'\d{4}-(0[1-9]|1[0-2])', str(data['release_date'])):
                  raise SystemExit(f'{recipe_file}: release_date must use YYYY-MM format')

      - name: Validate recipe shell scripts
        run: |
          while IFS= read -r -d '' script; do
            echo "Checking ${script}"
            bash -n "$script"
          done < <(find registry scripts -type f \( -name '*.sh' -o -name '*.bash' \) -print0)