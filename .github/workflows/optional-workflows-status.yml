name: Optional Workflows Status

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/optional-workflows-status.yml'
      - '.github/workflows/*.yml'
      - '.github/dependabot.yml'
      - 'docs/github-actions.md'
      - 'docs/pull-request-process.md'
      - 'CONTRIBUTING.md'

permissions:
  contents: read

jobs:
  report-status:
    runs-on: ubuntu-latest
    steps:
      - name: Report active automation state
        run: |
          echo "Repository automation is active by default."
          echo "Validation workflows:"
          echo "- .github/workflows/ci-validation.yml"
          echo "- .github/workflows/recipe-validation.yml"
          echo "- .github/workflows/docs-governance.yml"
          echo "Dependency and release workflows:"
          echo "- .github/workflows/dependency-updates.yml"
          echo "- .github/workflows/dependabot-auto-triage.yml"
          echo "- .github/workflows/release-package.yml"
          echo "- .github/workflows/desktop-build.yml"

      - name: Report Dependabot active state
        run: |
          echo "Dependabot configuration file: .github/dependabot.yml"
          echo "Current default state: active with bounded open pull request limits per ecosystem."
