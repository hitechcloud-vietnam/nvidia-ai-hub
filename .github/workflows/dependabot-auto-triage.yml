name: Dependabot Auto Triage

on:
  pull_request_target:
    types:
      - opened
      - reopened
      - synchronize

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  triage-dependabot-pr:
    if: ${{ github.actor == 'dependabot[bot]' }}
    runs-on: ubuntu-latest
    steps:
      - name: Apply dependency labels
        uses: actions/github-script@v9
        with:
          script: |
            const pr = context.payload.pull_request;
            const changedFiles = await github.paginate(
              github.rest.pulls.listFiles,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pr.number,
                per_page: 100,
              },
            );

            const labels = new Set(['dependencies']);
            const changedPaths = changedFiles.map((file) => file.filename);

            if (changedPaths.some((path) => path === 'requirements.txt')) {
              labels.add('backend');
            }

            if (changedPaths.some((path) => path.startsWith('frontend/'))) {
              labels.add('frontend');
            }

            if (changedPaths.some((path) => path.startsWith('.github/'))) {
              labels.add('governance');
            }

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              labels: [...labels],
            });

      - name: Post reviewer guidance comment
        uses: actions/github-script@v9
        with:
          script: |
            const pr = context.payload.pull_request;
            const body = [
              'Automated dependency triage is enabled for this pull request.',
              '',
              'Reviewer checklist:',
              '- confirm the dependency scope matches the files changed',
              '- review release notes or changelog impact before merge',
              '- ensure `docs/github-actions.md` guidance still matches repository automation policy',
              '- capture validation evidence if backend or frontend dependencies changed',
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              body,
            });