name: Dependency Updates Validation

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'requirements.txt'
      - 'frontend/package.json'
      - 'frontend/package-lock.json'
      - '.github/dependabot.yml'
      - '.github/workflows/*.yml'

permissions:
  contents: read

jobs:
  validate-dependency-updates:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Detect dependency change scope
        id: changes
        uses: dorny/paths-filter@v4
        with:
          filters: |
            python:
              - 'requirements.txt'
            frontend:
              - 'frontend/package.json'
              - 'frontend/package-lock.json'
            actions:
              - '.github/workflows/*.yml'
            dependabot:
              - '.github/dependabot.yml'

      - name: Setup Python
        if: ${{ steps.changes.outputs.python == 'true' || steps.changes.outputs.actions == 'true' || steps.changes.outputs.dependabot == 'true' }}
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install backend dependencies
        if: ${{ steps.changes.outputs.python == 'true' }}
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compile backend modules
        if: ${{ steps.changes.outputs.python == 'true' }}
        run: python -m compileall daemon

      - name: Install YAML validation dependency
        if: ${{ steps.changes.outputs.python != 'true' && (steps.changes.outputs.actions == 'true' || steps.changes.outputs.dependabot == 'true') }}
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyyaml

      - name: Setup Node.js
        if: ${{ steps.changes.outputs.frontend == 'true' }}
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: Install frontend dependencies
        if: ${{ steps.changes.outputs.frontend == 'true' }}
        working-directory: frontend
        run: npm ci

      - name: Lint frontend
        if: ${{ steps.changes.outputs.frontend == 'true' }}
        working-directory: frontend
        run: npm run lint

      - name: Build frontend
        if: ${{ steps.changes.outputs.frontend == 'true' }}
        working-directory: frontend
        run: npm run build

      - name: Validate Dependabot and workflow YAML
        if: ${{ steps.changes.outputs.actions == 'true' || steps.changes.outputs.dependabot == 'true' }}
        run: |
          python - <<'PY'
          from pathlib import Path
          import yaml

          files = [Path('.github/dependabot.yml'), *sorted(Path('.github/workflows').glob('*.yml'))]
          for file_path in files:
              with file_path.open('r', encoding='utf-8') as handle:
                  yaml.safe_load(handle)
              print(f'Validated YAML: {file_path}')
          PY

      - name: Summarize dependency validation scope
        run: |
          echo "python=${{ steps.changes.outputs.python }}"
          echo "frontend=${{ steps.changes.outputs.frontend }}"
          echo "actions=${{ steps.changes.outputs.actions }}"
          echo "dependabot=${{ steps.changes.outputs.dependabot }}"