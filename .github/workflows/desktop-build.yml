name: Desktop Build

on:
  push:
    tags:
      - 'v*'
    paths:
      - 'daemon/**'
      - 'frontend/**'
      - 'registry/**'
      - 'requirements.txt'
      - '.github/workflows/desktop-build.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: desktop-build-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_name: nvidia-ai-hub-desktop-windows
            build_command: npm run desktop:dist:win
          - os: macos-latest
            artifact_name: nvidia-ai-hub-desktop-macos
            build_command: npm run desktop:dist
          - os: ubuntu-latest
            artifact_name: nvidia-ai-hub-desktop-linux
            build_command: npm run desktop:dist
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build desktop artifacts
        working-directory: frontend
        run: ${{ matrix.build_command }}

      - name: Upload desktop artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            frontend/release/*.exe
            frontend/release/*.msi
            frontend/release/*.zip
            frontend/release/*.dmg
            frontend/release/*.AppImage
            frontend/release/*.deb
            frontend/release/*.tar.gz
            frontend/release/latest*.yml
          if-no-files-found: error
